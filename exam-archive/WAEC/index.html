<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAEC</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- MathJax for Math Formatting -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../Chatbot/chatbot.css">
</head>

<body>
    
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="title-group">
                <i class="fas fa-graduation-cap" style="color: #ea4335;"></i>
                Exam Practice
            </div>

            <div class="header-controls">
                <div class="score-tracker">
                    <span class="score-pill score-correct">
                        <i class="fas fa-check"></i>
                        <span id="correct-count">0</span>
                    </span>

                    <span class="score-pill score-wrong">
                        <i class="fas fa-times"></i>
                        <span id="wrong-count">0</span>
                    </span>
                </div>

                <div class="timer-badge">
                    <i class="fas fa-clock"></i>
                    <span id="timer-display">60:00</span>
                </div>
            </div>
        </div>
        
        <!-- Navigation Bar -->
        <div class="nav-bar">
            <input type="range" id="q-slider" min="1" max="1" value="1">
            <input type="number" id="q-input" min="1" max="1" value="1">
            <div class="q-counter">
                <span id="current-q-text">1</span> / 
                <span id="total-q-text">0</span>
            </div>
        </div>
        
        <!-- Unanswered Dots Container -->
        <div class="unanswered-dots-container" id="unanswered-dots">
            <!-- Dots rendered via JS -->
        </div>
        
        <!-- Question -->
        <div class="question-area">
            <div class="question-num">
                <span id="q-number-display">1</span>.
            </div>

            <div class="question-body">
                <div class="question-text" id="question-text">
                    Loading question...
                </div>
                <img id="question-image" class="question-image hidden" src="" alt="Question illustration">
            </div>
        </div>
        
        <!-- Options -->
        <div class="options-container" id="options-container">
            <!-- Options generated by JS -->
        </div>
        
        <!-- Footer -->
        <div class="footer-controls">
            <button class="btn btn-outline" id="btn-prev" onclick="changeQuestion(-1)">
                <i class="fas fa-arrow-left"></i> Back
            </button>

            <button class="btn btn-primary" id="btn-next" onclick="changeQuestion(1)">
                Next <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- ═══ PREPBOT ═══ -->
    <div id="prepbot"></div>

    <script src="./script.js" type="module"></script>
    <script src="../Chatbot/chatbot.js"></script>

</body>
</html>
