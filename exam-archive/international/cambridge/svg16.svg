        <svg viewBox="0 0 350 150" width="100%" height="150" xmlns="http://www.w3.org/2000/svg">
            <style>
                .bottle { fill: #f1f5f9; stroke: #333; stroke-width: 2; cursor: pointer; transition: fill 0.2s; }
                .bottle:hover { fill: #e2e8f0; }
                .bottle.selected { fill: #cbd5e1; }
                .bottle-label { fill: #fff; stroke: #333; stroke-width: 1; pointer-events: none; }
                .label-text { font-family: sans-serif; font-size: 14px; font-weight: bold; text-anchor: middle; pointer-events: none; }
                .cross { stroke: #ef4444; stroke-width: 4; stroke-linecap: round; display: none; pointer-events: none; }
                .bottle.selected + g + .cross { display: block; }
                .selected-cross { display: none; pointer-events: none;}
            </style>
            
            <g transform="translate(30, 10)">
                <path d="M 25 0 L 45 0 L 45 10 C 45 20, 60 25, 60 40 L 60 120 C 60 125, 55 130, 50 130 L 20 130 C 15 130, 10 125, 10 120 L 10 40 C 10 25, 25 20, 25 10 Z" class="bottle" onclick="this.classList.toggle('selected'); this.parentNode.querySelector('.selected-cross').style.display = this.classList.contains('selected') ? 'block' : 'none';" />
                <rect x="15" y="60" width="40" height="30" class="bottle-label"/>
                <text x="35" y="79" class="label-text">1.5 l</text>
                <g class="selected-cross cross">
                    <line x1="15" y1="40" x2="55" y2="100"/>
                    <line x1="55" y1="40" x2="15" y2="100"/>
                </g>
            </g>
            
            <g transform="translate(140, 10)">
                <path d="M 25 0 L 45 0 L 45 10 C 45 20, 60 25, 60 40 L 60 120 C 60 125, 55 130, 50 130 L 20 130 C 15 130, 10 125, 10 120 L 10 40 C 10 25, 25 20, 25 10 Z" class="bottle" onclick="this.classList.toggle('selected'); this.parentNode.querySelector('.selected-cross').style.display = this.classList.contains('selected') ? 'block' : 'none';" />
                <rect x="15" y="60" width="40" height="30" class="bottle-label"/>
                <text x="35" y="79" class="label-text">150 ml</text>
                <g class="selected-cross cross">
                    <line x1="15" y1="40" x2="55" y2="100"/>
                    <line x1="55" y1="40" x2="15" y2="100"/>
                </g>
            </g>
            
            <g transform="translate(250, 10)">
                <path d="M 25 0 L 45 0 L 45 10 C 45 20, 60 25, 60 40 L 60 120 C 60 125, 55 130, 50 130 L 20 130 C 15 130, 10 125, 10 120 L 10 40 C 10 25, 25 20, 25 10 Z" class="bottle" onclick="this.classList.toggle('selected'); this.parentNode.querySelector('.selected-cross').style.display = this.classList.contains('selected') ? 'block' : 'none';" />
                <rect x="13" y="60" width="44" height="30" class="bottle-label"/>
                <text x="35" y="79" class="label-text">1500 ml</text>
                <g class="selected-cross cross">
                    <line x1="15" y1="40" x2="55" y2="100"/>
                    <line x1="55" y1="40" x2="15" y2="100"/>
                </g>
            </g>
        </svg>