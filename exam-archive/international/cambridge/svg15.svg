        <svg viewBox="0 0 400 120" width="100%" height="120" xmlns="http://www.w3.org/2000/svg">
            <style>
                .fruit-text { font-family: sans-serif; font-size: 13px; fill: #1e293b; }
                .tag-box { fill: #f8fafc; stroke: #333; stroke-width: 1.5; }
                .tag-line { stroke: #333; stroke-width: 1.5; fill: none; }
            </style>
            
            <!-- Grapes -->
            <g transform="translate(30, 60)">
                <path d="M 40 30 Q 40 18 50 12" stroke="#22c55e" stroke-width="3" fill="none"/>
                <!-- Bunch of grapes -->
                <circle cx="20" cy="40" r="8" fill="#a855f7" stroke="#333"/>
                <circle cx="35" cy="40" r="8" fill="#a855f7" stroke="#333"/>
                <circle cx="50" cy="40" r="8" fill="#a855f7" stroke="#333"/>
                <circle cx="28" cy="52" r="8" fill="#a855f7" stroke="#333"/>
                <circle cx="42" cy="52" r="8" fill="#a855f7" stroke="#333"/>
                <circle cx="35" cy="64" r="8" fill="#a855f7" stroke="#333"/>
                
                <!-- Tag -->
                <path d="M 50 12 L 65 -5" class="tag-line"/>
                <rect x="65" y="-20" width="90" height="38" rx="3" class="tag-box"/>
                <text x="110" y="-1" text-anchor="middle" class="fruit-text" font-weight="bold">$1.68</text>
                <text x="110" y="13" text-anchor="middle" class="fruit-text">per kilogram</text>
            </g>
            
            <!-- Orange -->
            <g transform="translate(200, 60)">
                <circle cx="25" cy="45" r="20" fill="#f97316" stroke="#333" stroke-width="1.5"/>
                <circle cx="25" cy="25" r="2" fill="#333"/>
                
                <!-- Tag -->
                <path d="M 25 25 L 45 0" class="tag-line"/>
                <rect x="45" y="-20" width="50" height="35" rx="3" class="tag-box"/>
                <text x="70" y="-1" text-anchor="middle" class="fruit-text" font-weight="bold">65c</text>
                <text x="70" y="13" text-anchor="middle" class="fruit-text">each</text>
            </g>
            
            <!-- Banana -->
            <g transform="translate(290, 60)">
                <path d="M 20 60 Q 40 80 70 50 Q 60 40 30 50 Q 15 50 10 40 L 15 35 Q 20 45 20 60 Z" fill="#eab308" stroke="#333" stroke-width="1.5"/>
                
                <!-- Tag -->
                <path d="M 15 35 L 30 0" class="tag-line"/>
                <rect x="30" y="-20" width="50" height="35" rx="3" class="tag-box"/>
                <text x="55" y="-1" text-anchor="middle" class="fruit-text" font-weight="bold">49c</text>
                <text x="55" y="13" text-anchor="middle" class="fruit-text">each</text>
            </g>
        </svg>