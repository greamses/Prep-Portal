        <svg viewBox="0 0 300 320" width="100%" height="320" xmlns="http://www.w3.org/2000/svg" id="scale-svg">
            <style>
                .scale-body { fill: #f8fafc; stroke: #333; stroke-width: 2; }
                .pan { fill: #e2e8f0; stroke: #333; stroke-width: 2; stroke-linejoin: round; }
                .flour { fill: #fff; stroke: #cbd5e1; stroke-width: 1.5; }
                .tick-major { stroke: #333; stroke-width: 2.5; }
                .dial-text { font-family: sans-serif; font-size: 15px; text-anchor: middle; dominant-baseline: middle; fill: #1e293b; font-weight: bold; }
                .center-dot { fill: #333; }
                #dynamic-arrow { stroke: #ef4444; stroke-width: 3; fill: #ef4444; pointer-events: none; }
                .hit-area { fill: transparent; cursor: pointer; }
            </style>
            
            <!-- Base -->
            <path d="M 100 300 L 200 300 L 230 320 L 70 320 Z" class="pan"/>
            
            <!-- Neck & Pan -->
            <rect x="145" y="60" width="10" height="20" fill="#333"/>
            <path d="M 50 60 L 250 60 L 210 100 L 90 100 Z" class="pan"/>
            
            <!-- Flour mound -->
            <path d="M 70 60 Q 110 35 150 45 Q 190 30 230 60 Z" class="flour"/>
            
            <!-- Main Dial Circle -->
            <circle cx="150" cy="180" r="100" class="scale-body"/>
            <circle cx="150" cy="180" r="4" class="center-dot"/>
            <text x="150" y="160" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="bold">grams</text>
            
            <!-- Minor Ticks generated via stroke-dasharray. (100 ticks = 2 * PI * r / 100 => 6.28 gaps) -->
            <circle cx="150" cy="180" r="100" fill="none" stroke="#64748b" stroke-width="6" stroke-dasharray="1 5.2831853" transform="rotate(-90 150 180)"/>
            <!-- Hide interior of dashes -->
            <circle cx="150" cy="180" r="95" fill="#f8fafc" />
            
            <!-- Major Ticks & Numbers -->
            <g transform="rotate(0 150 180)"><line x1="150" y1="80" x2="150" y2="95" class="tick-major"/><text x="150" y="112" class="dial-text" transform="rotate(-0 150 112)">0</text></g>
            <g transform="rotate(36 150 180)"><line x1="150" y1="80" x2="150" y2="95" class="tick-major"/><text x="150" y="112" class="dial-text" transform="rotate(-36 150 112)">100</text></g>
            <g transform="rotate(72 150 180)"><line x1="150" y1="80" x2="150" y2="95" class="tick-major"/><text x="150" y="112" class="dial-text" transform="rotate(-72 150 112)">200</text></g>
            <g transform="rotate(108 150 180)"><line x1="150" y1="80" x2="150" y2="95" class="tick-major"/><text x="150" y="112" class="dial-text" transform="rotate(-108 150 112)">300</text></g>
            <g transform="rotate(144 150 180)"><line x1="150" y1="80" x2="150" y2="95" class="tick-major"/><text x="150" y="112" class="dial-text" transform="rotate(-144 150 112)">400</text></g>
            <g transform="rotate(180 150 180)"><line x1="150" y1="80" x2="150" y2="95" class="tick-major"/><text x="150" y="112" class="dial-text" transform="rotate(-180 150 112)">500</text></g>
            <g transform="rotate(216 150 180)"><line x1="150" y1="80" x2="150" y2="95" class="tick-major"/><text x="150" y="112" class="dial-text" transform="rotate(-216 150 112)">600</text></g>
            <g transform="rotate(252 150 180)"><line x1="150" y1="80" x2="150" y2="95" class="tick-major"/><text x="150" y="112" class="dial-text" transform="rotate(-252 150 112)">700</text></g>
            <g transform="rotate(288 150 180)"><line x1="150" y1="80" x2="150" y2="95" class="tick-major"/><text x="150" y="112" class="dial-text" transform="rotate(-288 150 112)">800</text></g>
            <g transform="rotate(324 150 180)"><line x1="150" y1="80" x2="150" y2="95" class="tick-major"/><text x="150" y="112" class="dial-text" transform="rotate(-324 150 112)">900</text></g>
            
            <circle cx="150" cy="180" r="100" fill="none" stroke="#333" stroke-width="2"/>
            
            <!-- Hit Area for JS Interaction -->
            <circle cx="150" cy="180" r="100" class="hit-area" id="scale-hit-area"/>
            
            <!-- JS will inject arrow here -->
            <g id="scale-arrow-container"></g>
        </svg>