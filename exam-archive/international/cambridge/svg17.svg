        <svg viewBox="0 0 150 200" width="100%" height="200" style="max-width: 150px;" xmlns="http://www.w3.org/2000/svg">
            <style>
                .rod { stroke: #333; stroke-width: 3; stroke-linecap: round; }
                .base { fill: #333; }
                .bead { fill: #1e293b; }
                .label { font-family: sans-serif; font-size: 15px; text-anchor: middle; font-weight: bold; }
                .frac { font-family: sans-serif; font-size: 13px; text-anchor: middle; font-weight: bold; }
            </style>
            
            <!-- Base -->
            <rect x="10" y="160" width="130" height="8" rx="4" class="base"/>
            
            <!-- Rods (U, 1/10, 1/100) -->
            <line x1="30" y1="20" x2="30" y2="160" class="rod"/>
            <line x1="75" y1="20" x2="75" y2="160" class="rod"/>
            <line x1="120" y1="20" x2="120" y2="160" class="rod"/>
            
            <!-- Labels -->
            <text x="30" y="182" class="label">U</text>
            
            <!-- 1/10 fraction -->
            <text x="75" y="177" class="frac">1</text>
            <line x1="66" y1="181" x2="84" y2="181" stroke="#000" stroke-width="1.5"/>
            <text x="75" y="195" class="frac">10</text>
            
            <!-- 1/100 fraction -->
            <text x="120" y="177" class="frac">1</text>
            <line x1="108" y1="181" x2="132" y2="181" stroke="#000" stroke-width="1.5"/>
            <text x="120" y="195" class="frac">100</text>
            
            <!-- Beads for U: 2 -->
            <circle cx="30" cy="152" r="6" class="bead"/>
            <circle cx="30" cy="138" r="6" class="bead"/>
            
            <!-- Beads for 1/10: 7 -->
            <circle cx="75" cy="152" r="6" class="bead"/>
            <circle cx="75" cy="138" r="6" class="bead"/>
            <circle cx="75" cy="124" r="6" class="bead"/>
            <circle cx="75" cy="110" r="6" class="bead"/>
            <circle cx="75" cy="96" r="6" class="bead"/>
            <circle cx="75" cy="82" r="6" class="bead"/>
            <circle cx="75" cy="68" r="6" class="bead"/>
            
            <!-- Beads for 1/100: 4 -->
            <circle cx="120" cy="152" r="6" class="bead"/>
            <circle cx="120" cy="138" r="6" class="bead"/>
            <circle cx="120" cy="124" r="6" class="bead"/>
            <circle cx="120" cy="110" r="6" class="bead"/>
        </svg>