<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <!-- ================= TOP HALF: SAMPLE ================= -->
  <text x="20" y="30" font-family="sans-serif" font-size="14" font-weight="bold" fill="#8B0000">sample</text>
  
  <!-- Horizontal continuous line -->
  <line x1="40" y1="80" x2="340" y2="80" stroke="black" stroke-width="1.5" />
  
  <!-- First intersection -->
  <line x1="120" y1="50" x2="120" y2="110" stroke="black" stroke-width="1.5" />
  
  <!-- Second intersection -->
  <line x1="240" y1="50" x2="240" y2="110" stroke="black" stroke-width="1.5" />
  
  <!-- Sample Numbers -->
  <text x="25" y="85" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">3</text>
  <text x="120" y="40" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">4</text>
  <text x="120" y="130" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">13</text>
  <text x="240" y="40" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">10</text>
  <text x="240" y="130" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">80</text>
  <text x="355" y="85" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">221</text>
  
  <!-- ================= BOTTOM HALF: QUESTION ================= -->
  <!-- Horizontal line -->
  <line x1="100" y1="200" x2="250" y2="200" stroke="black" stroke-width="1.5" />
  
  <!-- Vertical intersection -->
  <line x1="160" y1="170" x2="160" y2="230" stroke="black" stroke-width="1.5" />
  
  <!-- Question Numbers & Box -->
  <text x="80" y="205" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">13</text>
  <text x="160" y="160" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">5</text>
  
  <rect x="250" y="188" width="24" height="24" fill="none" stroke="black" stroke-width="1.5" />
  <text x="262" y="205" font-family="sans-serif" font-size="14" text-anchor="middle" fill="black">S</text>
</svg>