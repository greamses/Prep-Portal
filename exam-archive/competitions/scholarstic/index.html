<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scholastic Prep | Prep Portal 2026</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=JetBrains+Mono:wght@400;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../../main.css">
    <link rel="stylesheet" href="../Chatbot/chatbot.css">
    
    <style>
    /* ═══ LOADER ═══ */
    #loader {
        position: fixed;
        inset: 0;
        background: #0a0a0a;
        z-index: 9000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        transition: opacity .5s ease, visibility .5s ease;
    }
    #loader.done {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
    }
    .lw {
        overflow: hidden;
        line-height: 1;
    }
    .lw span {
        display: block;
        font-family: 'Unbounded', sans-serif;
        font-weight: 900;
        font-size: clamp(32px, 8vw, 72px);
        color: #ffffff;
        letter-spacing: -.03em;
        text-transform: uppercase;
        transform: translateY(110%);
        animation: loaderWordIn .7s cubic-bezier(.16,1,.3,1) forwards;
    }
    .lw:nth-child(2) span {
        color: #ffe500;
        animation-delay: .12s;
    }
    @keyframes loaderWordIn {
        to { transform: translateY(0); }
    }
    .lbar {
        width: 0;
        height: 3px;
        background: #ffe500;
        margin-top: 28px;
        animation: loaderBar .8s cubic-bezier(.16,1,.3,1) .35s forwards;
    }
    @keyframes loaderBar {
        to { width: clamp(160px, 30vw, 280px); }
    }

    /* ═══ SCROLL HINT ═══ */
    .scroll-hint {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: .22em;
        color: #0a0a0a;
        opacity: 0;
        z-index: 100;
        transition: opacity .4s ease;
        pointer-events: none;
    }
    body.loaded .scroll-hint { opacity: 1; }

    /* ═══ FEATURED BAND ═══ */
    .featured-band {
        display: flex;
        align-items: center;
        gap: 2rem;
        padding: 2rem clamp(18px, 5vw, 56px);
        border-top: var(--border);
        border-bottom: var(--border);
        background: var(--off);
        overflow-x: auto;
    }
    .featured-label span {
        font-family: 'JetBrains Mono', monospace;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: .12em;
        background: var(--yellow);
        border: 2px solid var(--ink);
        padding: 0.4rem 0.8rem;
        white-space: nowrap;
    }
    .featured-cards {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
    }
    .feat-card {
        display: block;
        text-decoration: none;
        border: var(--border);
        background: var(--bg);
        box-shadow: 4px 4px 0 var(--ink);
        transition: transform .12s, box-shadow .12s;
    }
    .feat-card:hover {
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0 var(--ink);
    }
    .feat-card-inner {
        padding: 1rem 1.5rem;
        display: flex;
        align-items: center;
        gap: 1rem;
    }
    .feat-badge {
        font-family: 'JetBrains Mono', monospace;
        font-size: 8px;
        font-weight: 600;
        background: var(--yellow);
        padding: 0.2rem 0.5rem;
        text-transform: uppercase;
        letter-spacing: .1em;
    }
    .feat-card h3 {
        font-family: 'Unbounded', sans-serif;
        font-weight: 700;
        font-size: 12px;
        margin: 0;
    }
    </style>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>

    <!-- ═══ LOADER ═══ -->
    <div id="loader">
        <div class="lw"><span>Scholastic</span></div>
        <div class="lw"><span>Prep.</span></div>
        <div class="lbar"></div>
    </div>

    <div class="scroll-hint">Scroll</div>

    <!-- ═══ NAVIGATION ═══ -->
    <nav class="site-nav">
        <a href="../index.html" class="nav-logo">Prep<span>Portal</span></a>
        <ul class="nav-links" id="nav-links"></ul>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <!-- ═══ TICKER ═══ -->
    <div class="ticker" aria-hidden="true">
        <div class="ticker-track" id="ticker-track"></div>
    </div>

    <!-- ═══ HERO SECTION ═══ -->
    <div class="hero">
        <div class="hero-left">
            <h1 class="hero-title" id="main-title">Scholastic<br>Prep.</h1>
        </div>
        <div class="hero-right">
            <p class="hero-tagline" id="hero-tagline"></p>
            <div class="hero-stats" id="hero-stats"></div>
        </div>
    </div>

    <!-- ═══ FEATURED BAND ═══ -->
    <div class="featured-band reveal">
        <div class="featured-label"><span>Live&nbsp;&nbsp;Now</span></div>
        <div class="featured-cards" id="featured-cards"></div>
    </div>

    <!-- ═══ SECTION HEADER ═══ -->
    <div class="section-header" id="categories">
        <h2 id="categories-title">All Categories</h2>
        <span id="categories-subtitle">5 levels</span>
    </div>

    <!-- ═══ MAIN CONTENT ═══ -->
    <main class="main-content">
        <div class="category-grid" id="category-grid"></div>
    </main>

    <!-- ═══ INFO STRIP ═══ -->
    <section class="info-strip" id="info-strip"></section>

    <!-- ═══ CTA BAND ═══ -->
    <section class="cta-band reveal">
        <h2 id="cta-title">Ready to <em>compete at the top?</em></h2>
        <a href="#categories" class="cta-btn" id="cta-btn">Start Upper Primary →</a>
    </section>

    <!-- ═══ FOOTER ═══ -->
    <footer class="site-footer">
        <div class="footer-top">
            <div class="footer-brand">
                <span class="footer-logo">Prep<span>Portal</span></span>
                <p id="footer-description"></p>
            </div>
        </div>
        <div class="footer-bottom">
            <p id="copyright"></p>
            <div class="footer-links" id="footer-links"></div>
        </div>
    </footer>

    <!-- ═══ CHATBOT ═══ -->
    <div id="prepbot"></div>
    <script src="../Chatbot/chatbot.js"></script>

    <script src="./data.js"></script>
    <script src="../../../main.js"></script>

</body>

</html>
