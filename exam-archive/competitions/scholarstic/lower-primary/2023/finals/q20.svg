<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
    <style>
        .grid-bg { fill: white; stroke: black; stroke-width: 2; }
        .grid-line { stroke: black; stroke-width: 1; }
        .cell { fill: #888; stroke: black; stroke-width: 1; }
    </style>
    <!-- Background grid outline -->
    <rect x="25" y="25" width="150" height="150" class="grid-bg" />
    
    <!-- Shaded cells based on the visual pattern shown in the image -->
    <rect x="55" y="25" width="30" height="30" class="cell" />
    <rect x="115" y="25" width="30" height="30" class="cell" />
    <rect x="25" y="55" width="30" height="30" class="cell" />
    <rect x="85" y="55" width="30" height="30" class="cell" />
    <rect x="145" y="55" width="30" height="30" class="cell" />
    <rect x="55" y="85" width="30" height="30" class="cell" />
    <rect x="115" y="85" width="30" height="30" class="cell" />
    <rect x="25" y="115" width="30" height="30" class="cell" />
    <rect x="85" y="115" width="30" height="30" class="cell" />
    <rect x="145" y="115" width="30" height="30" class="cell" />
    <rect x="55" y="145" width="30" height="30" class="cell" />
    <rect x="115" y="145" width="30" height="30" class="cell" />

    <!-- Overlay grid lines for crispness -->
    <line x1="55" y1="25" x2="55" y2="175" class="grid-line" />
    <line x1="85" y1="25" x2="85" y2="175" class="grid-line" />
    <line x1="115" y1="25" x2="115" y2="175" class="grid-line" />
    <line x1="145" y1="25" x2="145" y2="175" class="grid-line" />
    <line x1="25" y1="55" x2="175" y2="55" class="grid-line" />
    <line x1="25" y1="85" x2="175" y2="85" class="grid-line" />
    <line x1="25" y1="115" x2="175" y2="115" class="grid-line" />
    <line x1="25" y1="145" x2="175" y2="145" class="grid-line" />
    
    <rect x="25" y="25" width="150" height="150" fill="none" stroke="black" stroke-width="2" />
</svg>