<svg width="400" height="200" xmlns="http://www.w3.org/2000/svg">
    <style>
        .rect { fill: none; stroke: black; stroke-width: 1.5; }
        .dashed { fill: none; stroke: black; stroke-width: 1; stroke-dasharray: 4,4; }
        .label { font-family: sans-serif; font-size: 14px; text-anchor: middle; }
        .bold { font-weight: bold; font-style: italic;}
    </style>
    <!-- Rectangle R -->
    <rect x="50" y="50" width="120" height="90" class="rect" />
    <text x="110" y="100" class="label bold">R</text>
    <text x="110" y="40" class="label">8 cm</text>
    <text x="110" y="160" class="label">8 cm</text>
    <text x="35" y="100" class="label">6 cm</text>

    <!-- Figure S (Cut from top-right corner) -->
    <path d="M 230 140 L 350 140 L 350 65 L 290 65 L 290 50 L 230 50 Z" class="rect" />
    
    <!-- Dashed lines completing original R shape on S -->
    <line x1="290" y1="50" x2="350" y2="50" class="dashed" />
    <line x1="350" y1="50" x2="350" y2="65" class="dashed" />

    <!-- Labels for S -->
    <text x="260" y="45" class="label">4 cm</text>
    <text x="365" y="105" class="label">5 cm</text>
    <text x="290" y="100" class="label bold">S</text>
    <text x="290" y="155" class="label">8 cm</text>
    <text x="215" y="100" class="label">6 cm</text>
</svg>