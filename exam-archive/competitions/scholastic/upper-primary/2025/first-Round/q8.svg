<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
  </defs>
  
  <!-- Triangle -->
  <polygon points="80,30 30,130 130,130" fill="none" stroke="black" stroke-width="2" stroke-linejoin="round" />
  
  <!-- Dashed lines for height -->
  <line x1="80" y1="30" x2="160" y2="30" stroke="black" stroke-width="1.5" stroke-dasharray="4,4" />
  <line x1="130" y1="130" x2="160" y2="130" stroke="black" stroke-width="1.5" stroke-dasharray="4,4" />
  
  <!-- Height dimension -->
  <line x1="150" y1="35" x2="150" y2="125" stroke="black" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="156" y="85" font-family="sans-serif" font-size="14" fill="black">6</text>
  
  <!-- Base dimension -->
  <line x1="35" y1="145" x2="125" y2="145" stroke="black" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  <text x="75" y="162" font-family="sans-serif" font-size="14" fill="black">5</text>
</svg>