<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 150" width="100%" height="100%">
  <!-- Visible faces -->
  <polygon points="50,120 150,120 100,40" fill="#fde08b" stroke="black" stroke-width="2" stroke-linejoin="round" />
  <polygon points="150,120 200,90 150,10 100,40" fill="#e5b85c" stroke="black" stroke-width="2" stroke-linejoin="round" />
  
  <!-- Hidden dashed lines -->
  <polyline points="50,120 100,90 200,90" fill="none" stroke="black" stroke-width="2" stroke-dasharray="5,5" />
  <line x1="100" y1="90" x2="150" y2="10" stroke="black" stroke-width="2" stroke-dasharray="5,5" />
</svg>