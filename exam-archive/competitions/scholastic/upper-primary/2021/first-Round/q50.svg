<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7d3b8e" />
    </marker>
  </defs>
  
  <!-- The Square -->
  <rect x="40" y="40" width="100" height="100" fill="none" stroke="#7d3b8e" stroke-width="2" />
  
  <!-- Right angle markers -->
  <polyline points="40,50 50,50 50,40" fill="none" stroke="#7d3b8e" stroke-width="1" />
  <polyline points="130,40 130,50 140,50" fill="none" stroke="#7d3b8e" stroke-width="1" />
  <polyline points="140,130 130,130 130,140" fill="none" stroke="#7d3b8e" stroke-width="1" />
  <polyline points="40,130 50,130 50,140" fill="none" stroke="#7d3b8e" stroke-width="1" />
  
  <!-- Dimension line -->
  <line x1="160" y1="40" x2="160" y2="140" stroke="#7d3b8e" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)" />
  
  <!-- Small horizontal ticks for dimension line limits -->
  <line x1="155" y1="40" x2="165" y2="40" stroke="#7d3b8e" stroke-width="1.5" />
  <line x1="155" y1="140" x2="165" y2="140" stroke="#7d3b8e" stroke-width="1.5" />
  
  <!-- Dimension Text -->
  <rect x="150" y="80" width="20" height="20" fill="white" />
  <text x="160" y="95" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#7d3b8e">5</text>
</svg>