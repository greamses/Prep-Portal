<svg width="300" height="300" xmlns="http://www.w3.org/2000/svg">
    <style>
        .circle-bg { fill: none; stroke: black; stroke-width: 1.5; }
        .line { stroke: black; stroke-width: 1.5; }
        .dashed-line { stroke: black; stroke-width: 1; stroke-dasharray: 4,4; }
        .label { font-family: sans-serif; font-size: 14px; text-anchor: middle; }
    </style>
    <circle cx="150" cy="150" r="100" class="circle-bg" />
    
    <!-- Center point -->
    <circle cx="150" cy="150" r="2" fill="black" />

    <!-- Sector boundaries based on angles (C=30%, B=40%, A=30%) -->
    <line x1="150" y1="150" x2="50" y2="150" class="line" /> <!-- C/B Boundary -->
    <line x1="150" y1="150" x2="230.9" y2="208.8" class="line" /> <!-- B/A Boundary -->
    <line x1="150" y1="150" x2="180.9" y2="54.9" class="line" /> <!-- A/C Boundary -->

    <!-- Sector Labels -->
    <text x="110" y="100" class="label">C</text>
    <text x="110" y="120" class="label">30%</text>

    <text x="210" y="100" class="label">A</text>
    <text x="210" y="120" class="label">30%</text>

    <text x="150" y="210" class="label">B</text>
    <text x="150" y="190" class="label">40%</text>

    <!-- Dashed lines connecting center to percentages -->
    <line x1="150" y1="150" x2="115" y2="115" class="dashed-line" />
    <line x1="150" y1="150" x2="185" y2="115" class="dashed-line" />
    <line x1="150" y1="150" x2="150" y2="175" class="dashed-line" />
</svg>