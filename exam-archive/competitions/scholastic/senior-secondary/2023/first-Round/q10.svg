<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="100%" height="100%">
  <!-- Triangle -->
  <polygon points="30,30 30,120 160,120" fill="#e8e8e8" stroke="black" stroke-width="2" stroke-linejoin="round" />
  
  <!-- Right angle symbol -->
  <polyline points="30,110 40,110 40,120" fill="none" stroke="black" stroke-width="1.5" />
  
  <!-- Angle x -->
  <path d="M 30,55 A 25,25 0 0,0 50.5,44.2" fill="none" stroke="black" stroke-width="1.5" />
  <text x="35" y="65" font-family="sans-serif" font-size="12" font-style="italic" fill="black">x°</text>
  
  <!-- Angle 30° -->
  <path d="M 135,120 A 25,25 0 0,1 139.5,105.7" fill="none" stroke="black" stroke-width="1.5" />
  <text x="110" y="115" font-family="sans-serif" font-size="12" fill="black">30°</text>
</svg>