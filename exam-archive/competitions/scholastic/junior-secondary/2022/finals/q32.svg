<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
    <style>
        .line { stroke: black; stroke-width: 1.5; fill: none; }
        .label { font-family: sans-serif; font-size: 14px; }
        .tick { stroke: black; stroke-width: 1.5; }
    </style>
    <!-- Extended base line -->
    <line x1="40" y1="150" x2="260" y2="150" class="line" />

    <!-- Isosceles right triangle PQR -->
    <polygon points="130,100 80,150 180,150" class="line" />

    <!-- Tick marks indicating PQ = PR -->
    <line x1="101" y1="121" x2="109" y2="129" class="tick" />
    <line x1="151" y1="129" x2="159" y2="121" class="tick" />

    <!-- Vertex Labels -->
    <text x="125" y="90" class="label">P</text>
    <text x="70" y="170" class="label">Q</text>
    <text x="175" y="170" class="label">R</text>

    <!-- 135-degree exterior angle arc with arrowheads -->
    <path d="M 210 150 A 30 30 0 0 0 158.8 128.8" class="line" />
    <path d="M 158.8 128.8 L 165 123 L 163 133 Z" fill="black" />
    <path d="M 210 150 L 205 143 L 215 143 Z" fill="black" />
    
    <text x="210" y="130" class="label">135°</text>
</svg>