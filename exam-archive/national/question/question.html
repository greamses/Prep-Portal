<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASSCE Practice | Prep Portal</title>
    
    <link rel="stylesheet" href="./question.css">
    
    <!-- MathJax 3 — $...$ inline, $$...$$ display -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [
                    ['$', '$'],
                    ['\\(', '\\)']
                ],
                displayMath: [
                    ['$$', '$$'],
                    ['\\[', '\\]']
                ],
                processEscapes: true
            },
            options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre'] },
            startup: { typeset: false }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
</head>

<body>
    
    <!-- ── QUIZ SCREEN ──────────────────────────────────────── -->
    <div class="quiz-shell" id="quiz-screen">
        
        <div class="exam-header">
            <div>
                <div class="exam-eyebrow">Prep Portal &middot; WASSCE</div>
                <h1 id="display-subject">Loading&hellip;</h1>
            </div>
            <div class="exam-meta" id="display-meta">—</div>
        </div>
        
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        
        <div class="q-counter-row">
            <span id="q-counter-label">Q — of —</span>
            <div class="q-dots" id="q-dots"></div>
        </div>
        
        <div id="loading-state">
            <div class="loading-spinner"></div>
            <p>Loading questions&hellip;</p>
        </div>
        
        <div class="question-card" id="question-card" style="display:none">
            <span class="q-number-badge" id="q-number-badge">Q 1</span>
            <div class="q-text" id="q-text"></div>
            <div id="q-image-wrap"></div>
            <div id="q-options"></div>
        </div>
        
        <div class="feedback-strip" id="feedback-strip">
            <span class="feedback-label" id="feedback-label"></span>
            <div id="feedback-expl"></div>
            <div class="feedback-actions" id="feedback-actions"></div>
        </div>
        
        <div class="nav-bar" id="nav-bar" style="display:none">
            <div class="nav-left">
                <a href="#" class="quit-link" id="quit-link">← Quit</a>
            </div>
            <div class="nav-mid">
                <button class="btn" id="prev-btn" onclick="Quiz.navigate(-1)" disabled>
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M8 1L3 6l5 5" />
                    </svg>
                    Prev
                </button>
            </div>
            <div class="nav-right">
                <button class="btn btn-yellow" id="next-btn" onclick="Quiz.navigate(1)">
                    Next
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M4 1l5 5-5 5" />
                    </svg>
                </button>
                <button class="btn btn-ink" id="submit-btn" onclick="Quiz.confirmSubmit()" style="display:none">
                    Submit
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 6h8M7 3l3 3-3 3" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
    
    <!-- ── RESULTS SCREEN ───────────────────────────────────── -->
    <div class="quiz-shell" id="results-screen" style="display:none;flex-direction:column;">
        
        <div class="print-header" id="print-header">Prep Portal &middot; WASSCE — Results</div>
        
        <div class="results-header">
            <div class="eyebrow">Exam Complete</div>
            <div class="score-display" id="res-score">—</div>
            <div class="score-label" id="res-grade">—</div>
        </div>
        
        <div class="results-grid">
            <div class="res-stat green"><strong id="res-correct">0</strong><span>Correct</span></div>
            <div class="res-stat red"> <strong id="res-wrong">0</strong> <span>Wrong</span></div>
            <div class="res-stat"> <strong id="res-skipped">0</strong><span>Skipped</span></div>
        </div>
        
        <div class="review-list" id="review-list"></div>
        
        <div class="results-actions no-print">
            <button class="btn" onclick="window.history.back()">← Back</button>
            <button class="btn btn-yellow" onclick="Quiz.retake()">Retake</button>
            <button class="btn btn-ink" onclick="Quiz.print()">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="4" width="8" height="6" />
                    <path d="M4 4V1h4v3M4 8h4" />
                </svg>
                Print
            </button>
        </div>
    </div>
    
    <!-- ── PREPBOT FAB ───────────────────────────────────────── -->
    <div id="chat-fab-wrap">
        <button id="chat-fab-dismiss" onclick="PrepBot.dismissFAB()" title="Dismiss">&#x2715;</button>
        <button id="chat-fab" onclick="PrepBot.toggle()" aria-label="Open PrepBot">
            <!-- Chat bubble icon matching screenshot -->
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 2h16v12H11l-4 4v-4H2z" />
            </svg>
            <span class="fab-dot"></span>
        </button>
    </div>
    
    <!-- Restore tab (appears after dismiss) -->
    <button id="chat-fab-restore" onclick="PrepBot.restoreFAB()">
        <svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 2h16v12H11l-4 4v-4H2z" />
        </svg>
        Bot
    </button>
    
    <!-- ── CHAT WINDOW ───────────────────────────────────────── -->
    <div id="chat-window">
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="chat-avatar">
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M2 2h16v12H11l-4 4v-4H2z" />
                    </svg>
                </div>
                <div class="chat-header-info">
                    <h4>PrepBot</h4>
                    <div class="chat-status">
                        <span class="chat-status-dot"></span>
                        AI &amp; Voice Synced
                    </div>
                </div>
            </div>
            <div class="chat-header-actions">
                <button class="chat-icon-btn" id="qnav-toggle-btn" onclick="PrepBot.toggleQNav()" title="Jump to question">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8">
                        <rect x="1" y="1" width="4" height="4" />
                        <rect x="9" y="1" width="4" height="4" />
                        <rect x="1" y="9" width="4" height="4" />
                        <rect x="9" y="9" width="4" height="4" />
                    </svg>
                </button>
                <button class="chat-icon-btn" onclick="PrepBot.clearChat()" title="Clear chat">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8">
                        <polyline points="2 4 4 4 12 4" />
                        <path d="M5 4V2h4v2M12 4l-.8 8H2.8L2 4" />
                    </svg>
                </button>
                <button class="chat-icon-btn" onclick="PrepBot.close()" title="Close">&#x2715;</button>
            </div>
        </div>
        
        <!-- Context banner (shown when seeded from a question) -->
        <div class="chat-context-banner" id="chat-context-banner">
            <span class="chat-context-label">Current Question</span>
            <span id="chat-context-text"></span>
        </div>
        
        <!-- Q-nav bubbles panel (toggles on grid icon click) -->
        <div class="qbubbles-bar" id="qbubbles-bar" style="display:none">
            <div class="qbubbles-header">
                <span class="qbubbles-title">
                    <svg width="10" height="10" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8">
                        <rect x="1" y="1" width="4" height="4" />
                        <rect x="9" y="1" width="4" height="4" />
                        <rect x="1" y="9" width="4" height="4" />
                        <rect x="9" y="9" width="4" height="4" />
                    </svg>
                    Go to Question
                </span>
                <button class="qbubbles-close" onclick="PrepBot.closeQNav()">&#x2715;</button>
            </div>
            <div class="qbubbles-grid" id="qbubbles-grid"></div>
        </div>
        <!-- Add this inside #chat-window, before .chat-messages -->
        <div id="thinking-indicator" style="display: none; position: absolute; top: 60px; right: 16px; background: var(--blue); color: white; padding: 6px 12px; font-size: 0.7rem; font-family: var(--font-mono); border: var(--border); z-index: 100; box-shadow: 2px 2px 0 var(--ink); pointer-events: none;">
             Using advanced AI...
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        
        <div class="suggestion-chips" id="suggestion-chips"></div>
        
        <div class="chat-input-area">
            <textarea id="chat-input" placeholder="Type or click Mic…" rows="1"></textarea>
            <button id="chat-mic" onclick="PrepBot.toggleMic()" title="Voice input">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8">
                    <rect x="6" y="1" width="6" height="9" rx="3" />
                    <path d="M3 9a6 6 0 0 0 12 0M9 15v2M6 17h6" />
                </svg>
            </button>
            <button id="chat-send" onclick="PrepBot.send()">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2L1 7l6 1 1 6 6-12z" />
                </svg>
            </button>
        </div>
    </div>
    
    <!-- Popup nudge -->
    <div id="prepbot-popup" onclick="PrepBot.open()">
        <button class="prepbot-popup-close" onclick="event.stopPropagation(); PrepBot.hidePopup()">&#x2715;</button>
        <p id="prepbot-popup-text"></p>
    </div>
    
    <!-- ── CONFIRM MODAL ─────────────────────────────────────── -->
    <div id="pp-confirm-overlay">
        <div class="pp-confirm-box">
            <div class="pp-confirm-title">Submit Paper?</div>
            <p class="pp-confirm-body" id="confirm-body"></p>
            <div class="pp-confirm-ftr">
                <button class="btn" onclick="Quiz.closeConfirm()">Go Back</button>
                <button class="btn btn-ink" onclick="Quiz.submit()">Yes, Submit</button>
            </div>
        </div>
    </div>
    
    <script type="module" src="../../../../../theory-page/js/keys.js"></script>
    <script src="./js/config-helpers.js"></script>
    <script src="./js/api-services.js"></script>
    <script src="./js/quiz-engine.js"></script>
    <script src="./js/prepbot.js"></script>
    <script src="./js/video-player.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
