<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 240" width="100%" height="100%">
  <!-- Definitions for styling -->
  <defs>
    <style>
      .face-front { 
        fill: #dbeafe; 
        stroke: #2563eb; 
        stroke-width: 3; 
        stroke-linejoin: round; 
      }
      .face-top { 
        fill: #eff6ff; 
        stroke: #2563eb; 
        stroke-width: 3; 
        stroke-linejoin: round; 
      }
      .face-right { 
        fill: #bfdbfe; 
        stroke: #2563eb; 
        stroke-width: 3; 
        stroke-linejoin: round; 
      }
      .hidden-line { 
        stroke: #60a5fa; 
        stroke-width: 2; 
        stroke-dasharray: 5,5; 
        stroke-linecap: round; 
      }
      .label-text { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 18px; 
        fill: #1e293b; 
        text-anchor: middle; 
        dominant-baseline: middle; 
      }
      .vol-text { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 20px; 
        font-weight: bold; 
        fill: #dc2626; 
        text-anchor: middle; 
        dominant-baseline: middle; 
      }
    </style>
  </defs>

  <!-- Hidden back edges -->
  <line x1="75" y1="200" x2="125" y2="160" class="hidden-line" />
  <line x1="125" y1="70" x2="125" y2="160" class="hidden-line" />
  <line x1="275" y1="160" x2="125" y2="160" class="hidden-line" />

  <!-- Cuboid Faces -->
  <!-- Top Face -->
  <polygon points="75,110 125,70 275,70 225,110" class="face-top" />
  
  <!-- Right Face -->
  <polygon points="225,110 275,70 275,160 225,200" class="face-right" />
  
  <!-- Front Face -->
  <polygon points="75,110 225,110 225,200 75,200" class="face-front" />

  <!-- Dimension Labels -->
  <!-- Length (5 cm) -->
  <text x="150" y="222" class="label-text">5 cm</text>
  
  <!-- Height (3 cm) -->
  <text x="40" y="155" class="label-text">3 cm</text>
  
  <!-- Width / Depth (2 cm) -->
  <text x="270" y="190" class="label-text">2 cm</text>

  <!-- Question indicator -->
  <text x="175" y="35" class="vol-text">Volume = ?</text>
</svg>