<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 240" width="100%" height="100%">
  <!-- Definitions for styling -->
  <defs>
    <style>
      .semi-circle { 
        fill: #f3e8ff; 
        stroke: #9333ea; 
        stroke-width: 3; 
        stroke-linejoin: round; 
      }
      .radius-line { 
        stroke: #1e293b; 
        stroke-width: 2; 
        stroke-linecap: round; 
        stroke-dasharray: 4,4;
      }
      .center-dot { 
        fill: #1e293b; 
      }
      .base-line {
        stroke: #9333ea;
        stroke-width: 3;
        stroke-linecap: round;
      }
      .label-text { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 18px; 
        fill: #1e293b; 
        text-anchor: middle; 
        dominant-baseline: middle; 
      }
      .area-text { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 22px; 
        font-weight: bold; 
        fill: #7e22ce; 
        text-anchor: middle; 
        dominant-baseline: middle; 
      }
    </style>
  </defs>

  <!-- Semi-circle Path (Center at 170, 170 with Radius 100) -->
  <path d="M 70 170 A 100 100 0 0 1 270 170 Z" class="semi-circle" />

  <!-- Center dot -->
  <circle cx="170" cy="170" r="4" class="center-dot" />

  <!-- Radius line from center to right edge -->
  <line x1="170" y1="170" x2="270" y2="170" class="radius-line" />

  <!-- Labels -->
  <!-- Radius label -->
  <text x="220" y="155" class="label-text">r = 7 cm</text>
  
  <!-- Area label -->
  <text x="170" y="125" class="area-text">Area = ?</text>
</svg>