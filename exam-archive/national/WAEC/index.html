<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAEC Subject Selector | SS3 Only</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=JetBrains+Mono:wght@400;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        /* ── FONTS ── */
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=JetBrains+Mono:wght@400;600&family=DM+Serif+Display&display=swap');

        /* ════════════════════════════════════════
                TOKENS (merged from theme)
           ════════════════════════════════════════ */
        :root {
            --bg: #ffffff;
            --app-bg: #f0ece3;
            --ink: #0a0a0a;
            --yellow: #ffe500;
            --blue: #0055ff;
            --red: #ff2200;
            --green: #00a550;
            --amber: #e67e00;
            --muted: #777;
            --off: #f7f4ee;
            --paper: #fffef8;
            --ruled: #ece8df;
            --border: 2.5px solid #0a0a0a;
            
            /* quiz-specific feedback */
            --correct-bg: #00a550;
            --incorrect-bg: #ff2200;
            --option-hover: #f7f4ee;
        }

        /* ════════════════════════════════════════
                RESET
           ════════════════════════════════════════ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            overflow-x: hidden;
            width: 100%;
        }

        /* ════════════════════════════════════════
                BODY (themed)
           ════════════════════════════════════════ */
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--app-bg);
            background-image:
                radial-gradient(circle at 18% 75%, rgba(255, 229, 0, .13) 0%, transparent 42%),
                radial-gradient(circle at 82% 12%, rgba(0, 85, 255, .08) 0%, transparent 42%);
            min-height: 100vh;
            color: var(--ink);
            padding: clamp(10px, 5vw, 40px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* ════════════════════════════════════════
                APP CONTAINER (themed)
           ════════════════════════════════════════ */
        .app-container {
            background: var(--bg);
            width: 100%;
            max-width: 900px;
            border: var(--border);
            box-shadow: 10px 10px 0 var(--ink);
            padding: 0;
            overflow: hidden;
            animation: appRise .6s cubic-bezier(.16, 1, .3, 1) both;
        }

        @keyframes appRise {
            from {
                opacity: 0;
                transform: translateY(28px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ════════════════════════════════════════
                HEADER (themed)
           ════════════════════════════════════════ */
        .header {
            background: var(--ink);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px clamp(18px, 4vw, 36px);
            border-bottom: var(--border);
            gap: 12px;
            flex-wrap: wrap;
        }

        .title-group {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: clamp(11px, 2.4vw, 14px);
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--bg);
            white-space: nowrap;
        }

        .title-group span {
            color: var(--yellow);
        }

        /* ════════════════════════════════════════
                STREAM SELECTION (themed)
           ════════════════════════════════════════ */
        .stream-section {
            padding: 24px clamp(18px, 4vw, 36px);
            border-bottom: var(--border);
            background: var(--off);
        }

        .stream-label {
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .1em;
            margin-bottom: 12px;
            display: block;
        }

        .stream-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .stream-btn {
            padding: 10px 20px;
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .08em;
            border: var(--border);
            background: var(--bg);
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 3px 3px 0 var(--ink);
        }

        .stream-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0 var(--ink);
            background: var(--yellow);
        }

        .stream-btn.active {
            background: var(--blue);
            color: var(--bg);
            border-color: var(--ink);
        }

        /* ════════════════════════════════════════
                COUNTER PANEL (themed)
           ════════════════════════════════════════ */
        .counter-panel {
            padding: 18px clamp(18px, 4vw, 36px);
            border-bottom: 1px solid var(--ruled);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            background: var(--bg);
        }

        .counter-box {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 12px;
            background: var(--off);
            padding: 8px 16px;
            border: var(--border);
            box-shadow: 3px 3px 0 var(--ink);
        }

        .counter-value {
            font-size: 28px;
            font-weight: 900;
            color: var(--blue);
            line-height: 1;
        }

        .warning-message {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            color: var(--red);
        }

        .warning-message.success {
            color: var(--green);
        }

        /* ════════════════════════════════════════
                SUBJECTS GRID (themed)
           ════════════════════════════════════════ */
        .subjects-grid {
            padding: 24px clamp(18px, 4vw, 36px);
            background: var(--bg);
            min-height: 400px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .subject-card {
            border: var(--border);
            background: var(--off);
            padding: 16px;
            transition: all 0.15s;
            box-shadow: 4px 4px 0 var(--ink);
        }

        .subject-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--ink);
        }

        .subject-card.selected-subject {
            background: #fff9e0;
            border-left: 6px solid var(--yellow);
        }

        .subject-name {
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }

        .check-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            padding: 6px 0;
        }

        .check-option input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--blue);
        }

        .placeholder-message {
            text-align: center;
            padding: 60px 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--muted);
            border: 2px dashed var(--ruled);
            background: var(--off);
        }

        /* ════════════════════════════════════════
                FOOTER (themed)
           ════════════════════════════════════════ */
        .footer-actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            padding: 20px clamp(18px, 4vw, 36px) 28px;
            border-top: var(--border);
            background: var(--off);
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .08em;
            cursor: pointer;
            border: var(--border);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 4px 4px 0 var(--ink);
            transition: transform .08s, box-shadow .08s, background .1s;
        }

        .btn:hover:not(:disabled) {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0 var(--ink);
        }

        .btn:active:not(:disabled) {
            transform: translate(3px, 3px) !important;
            box-shadow: 1px 1px 0 var(--ink) !important;
        }

        .btn:disabled {
            opacity: .45;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn-primary {
            background: var(--blue);
            color: var(--bg);
        }

        .btn-outline {
            background: var(--bg);
            color: var(--ink);
        }

        .btn-outline:hover {
            background: var(--red);
            color: var(--bg);
        }

        .info-note {
            padding: 14px clamp(18px, 4vw, 36px) 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            border-top: 1px solid var(--ruled);
            background: var(--bg);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }
            .footer-actions {
                flex-direction: column-reverse;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
            .counter-panel {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="title-group">WAEC <span>SELECTOR</span></div>
            <div class="title-group">SS3 · THEORY/OBJ</div>
        </div>

        <!-- Stream Selection -->
        <div class="stream-section">
            <div class="stream-label">▼ SELECT YOUR STREAM</div>
            <div class="stream-buttons">
                <button type="button" class="stream-btn" data-stream="science">🔬 SCIENCE</button>
                <button type="button" class="stream-btn" data-stream="arts">🎭 ARTS</button>
                <button type="button" class="stream-btn" data-stream="commercial">💼 COMMERCIAL</button>
            </div>
        </div>

        <!-- Counter & Status -->
        <div class="counter-panel">
            <div class="counter-box">
                <span>SELECTED</span>
                <span class="counter-value" id="selectedCount">0</span>
                <span>/ 9</span>
            </div>
            <div class="warning-message" id="warningMsg"></div>
        </div>

        <!-- Subjects Grid -->
        <div class="subjects-grid" id="subjectsGrid">
            <div class="placeholder-message">⚡ Choose your stream (Science / Arts / Commercial) to load WAEC subjects</div>
        </div>

        <!-- Footer Actions -->
        <div class="footer-actions">
            <button type="button" class="btn btn-outline" id="clearAllBtn">✕ CLEAR ALL</button>
            <button type="button" class="btn btn-primary" id="proceedBtn" disabled>→ PROCEED TO PRACTICE</button>
        </div>

        <div class="info-note">
            <span>📌</span> Max 9 subjects. Each subject counts if Objective and/or Theory is checked. At least one selection required to proceed.
        </div>
    </div>

    <script>
        // WAEC Subject Data (SS3 only)
        const WAEC_SUBJECTS = {
            science: [
                "English Language", "Mathematics", "Physics", "Chemistry", "Biology",
                "Further Mathematics", "Agricultural Science", "Computer Science",
                "Geography", "Economics", "Technical Drawing", "Food & Nutrition", "CRS / IRS"
            ],
            arts: [
                "English Language", "Mathematics", "Literature in English", "Government",
                "History", "CRS / IRS", "Yoruba / Hausa / Igbo", "French", "Fine Art",
                "Music", "Economics", "Geography", "Islamic Studies"
            ],
            commercial: [
                "English Language", "Mathematics", "Commerce", "Financial Accounting",
                "Economics", "Government", "Business Studies", "Marketing",
                "Office Practice", "CRS / IRS", "Computer Studies", "Geography",
                "Typewriting & Data Processing"
            ]
        };

        // State
        let currentStream = null;
        let selectedSubjects = []; // array of { name, objective, theory }

        // DOM Elements
        const subjectsGrid = document.getElementById('subjectsGrid');
        const selectedCountSpan = document.getElementById('selectedCount');
        const warningMsg = document.getElementById('warningMsg');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const proceedBtn = document.getElementById('proceedBtn');
        const streamBtns = document.querySelectorAll('.stream-btn');

        // Helper: Count subjects with at least one checkbox checked
        function countSelectedSubjects() {
            return selectedSubjects.filter(s => s.objective || s.theory).length;
        }

        // Update UI: counter, warning, proceed button, and highlight cards
        function updateUI() {
            const count = countSelectedSubjects();
            selectedCountSpan.textContent = count;
            
            if (count === 0) {
                warningMsg.textContent = '⚠️ Select at least 1 subject (Objective and/or Theory)';
                warningMsg.classList.remove('success');
                proceedBtn.disabled = true;
            } else if (count > 9) {
                warningMsg.textContent = '❌ Maximum 9 subjects exceeded! Uncheck some options.';
                warningMsg.classList.remove('success');
                proceedBtn.disabled = true;
            } else {
                warningMsg.textContent = `✓ ${count} subject${count !== 1 ? 's' : ''} selected (max 9)`;
                warningMsg.classList.add('success');
                proceedBtn.disabled = false;
            }
            
            // Update card styling
            document.querySelectorAll('.subject-card').forEach((card, idx) => {
                const subj = selectedSubjects[idx];
                if (subj && (subj.objective || subj.theory)) {
                    card.classList.add('selected-subject');
                } else {
                    card.classList.remove('selected-subject');
                }
            });
        }

        // Render subjects based on current stream
        function renderSubjects(stream) {
            const subjectsList = WAEC_SUBJECTS[stream];
            if (!subjectsList) return;
            
            // Initialize selectedSubjects array
            selectedSubjects = subjectsList.map(name => ({
                name: name,
                objective: false,
                theory: false
            }));
            
            // Build grid HTML
            subjectsGrid.innerHTML = `
                <div class="grid-layout">
                    ${subjectsList.map((subject, idx) => `
                        <div class="subject-card" data-index="${idx}">
                            <div class="subject-name">
                                <strong>${subject}</strong>
                            </div>
                            <div class="checkbox-group">
                                <label class="check-option">
                                    <input type="checkbox" class="obj-checkbox" data-idx="${idx}">
                                    <span>📘 Objective</span>
                                </label>
                                <label class="check-option">
                                    <input type="checkbox" class="theory-checkbox" data-idx="${idx}">
                                    <span>📝 Theory</span>
                                </label>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            // Attach event listeners to checkboxes
            document.querySelectorAll('.obj-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    selectedSubjects[idx].objective = e.target.checked;
                    updateUI();
                });
            });
            
            document.querySelectorAll('.theory-checkbox').forEach(cb => {
                cb.addEventListener('change', (e) => {
                    const idx = parseInt(e.target.dataset.idx);
                    selectedSubjects[idx].theory = e.target.checked;
                    updateUI();
                });
            });
            
            updateUI();
        }

        // Clear all selections
        function clearAllSelections() {
            if (!currentStream) return;
            
            // Reset state
            selectedSubjects.forEach(subj => {
                subj.objective = false;
                subj.theory = false;
            });
            
            // Uncheck all checkboxes in DOM
            document.querySelectorAll('.obj-checkbox, .theory-checkbox').forEach(cb => {
                cb.checked = false;
            });
            
            updateUI();
        }

        // Handle stream selection
        function setStream(stream) {
            currentStream = stream;
            
            // Update active button styling
            streamBtns.forEach(btn => {
                if (btn.dataset.stream === stream) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            // Render subjects for this stream
            renderSubjects(stream);
        }

        // Proceed button handler
        function proceedToPractice() {
            const count = countSelectedSubjects();
            if (count === 0 || count > 9) return;
            
            const selectedWithOptions = selectedSubjects.filter(s => s.objective || s.theory);
            const summary = selectedWithOptions.map(s => {
                const modes = [];
                if (s.objective) modes.push('Objective');
                if (s.theory) modes.push('Theory');
                return `${s.name} (${modes.join('/')})`;
            }).join('\n');
            
            alert(`✅ Selection confirmed!\n\nYou selected ${count} subject(s):\n${summary}\n\nProceeding to practice module...`);
            // Here you would redirect to the practice page or load the next module
            console.log('Proceed with:', selectedWithOptions);
        }

        // Event Listeners
        streamBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const stream = btn.dataset.stream;
                setStream(stream);
            });
        });
        
        clearAllBtn.addEventListener('click', clearAllSelections);
        proceedBtn.addEventListener('click', proceedToPractice);
        
        // Initial placeholder
        subjectsGrid.innerHTML = '<div class="placeholder-message">✨ Select your stream (Science / Arts / Commercial) to load WAEC subjects</div>';
    </script>
</body>
</html>
