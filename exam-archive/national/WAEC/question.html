<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WASSCE Practice | Prep Portal</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=JetBrains+Mono:ital,wght@0,400;0,600;0,700;1,400&family=Caveat:wght@500;700&display=swap" rel="stylesheet">

    <!-- MathJax 3 — $...$ inline, $$...$$ display -->
    <script>
    MathJax = {
        tex: {
            inlineMath:  [['$','$'], ['\\(','\\)']],
            displayMath: [['$$','$$'], ['\\[','\\]']],
            processEscapes: true
        },
        options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] },
        startup: { typeset: false }
    };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>

    <style>
        /* ─── TOKENS ─────────────────────────────────────────────── */
        :root {
            --ink:      #1a1a1a;
            --bg:       #f5f0e8;
            --yellow:   #ffe600;
            --blue:     #0047ff;
            --green:    #00c04b;
            --red:      #e5000a;
            --off:      #eae5d8;
            --ruled:    #d6d0c4;
            --white:    #ffffff;
            --shadow:   4px 4px 0 var(--ink);
            --shadow-lg:6px 6px 0 var(--ink);
            --font-display: 'Unbounded', sans-serif;
            --font-mono:    'JetBrains Mono', monospace;
            --font-hand:    'Caveat', cursive;
            --radius: 0px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            font-family: var(--font-mono);
            color: var(--ink);
            min-height: 100vh;
            padding: 24px 16px 60px;
        }

        /* ─── PAGE SHELL ─────────────────────────────────────────── */
        .quiz-shell {
            max-width: 780px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* ─── EXAM HEADER ────────────────────────────────────────── */
        .exam-header {
            background: var(--ink);
            color: var(--white);
            padding: 20px 28px 16px;
            border: 2.5px solid var(--ink);
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .exam-header-left .exam-eyebrow {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--yellow);
            margin-bottom: 4px;
        }

        .exam-header-left h1 {
            font-family: var(--font-display);
            font-size: clamp(16px, 3vw, 22px);
            font-weight: 900;
            letter-spacing: -.01em;
            line-height: 1.1;
        }

        .exam-meta {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: rgba(255,255,255,.65);
            text-align: right;
        }

        /* ─── PROGRESS BAR ───────────────────────────────────────── */
        .progress-track {
            height: 6px;
            background: var(--ruled);
            border-left: 2.5px solid var(--ink);
            border-right: 2.5px solid var(--ink);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--yellow);
            border-right: 2px solid var(--ink);
            transition: width .35s cubic-bezier(.4,0,.2,1);
            width: 0%;
        }

        /* ─── QUESTION COUNTER ROW ───────────────────────────────── */
        .q-counter-row {
            background: var(--off);
            border: 2.5px solid var(--ink);
            border-top: none;
            padding: 8px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        .q-counter-row .q-label {
            color: var(--ink);
        }

        .q-counter-row .q-dots {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            max-width: 60%;
            justify-content: flex-end;
        }

        .q-dot {
            width: 8px; height: 8px;
            border: 2px solid var(--ink);
            background: transparent;
            cursor: pointer;
            transition: background .15s;
            flex-shrink: 0;
        }
        .q-dot.answered  { background: var(--yellow); }
        .q-dot.current   { background: var(--ink); }
        .q-dot.correct   { background: var(--green); border-color: var(--green); }
        .q-dot.wrong     { background: var(--red);   border-color: var(--red); }

        /* ─── QUESTION CARD ──────────────────────────────────────── */
        .question-card {
            background: var(--white);
            border: 2.5px solid var(--ink);
            border-top: none;
            padding: 32px 28px 28px;
            min-height: 340px;
            display: flex;
            flex-direction: column;
        }

        .q-number-badge {
            font-family: var(--font-display);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: .1em;
            text-transform: uppercase;
            background: var(--yellow);
            color: var(--ink);
            border: 2px solid var(--ink);
            display: inline-block;
            padding: 3px 10px;
            margin-bottom: 14px;
            box-shadow: 2px 2px 0 var(--ink);
        }

        .q-text {
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.75;
            color: var(--ink);
            flex: 1;
            margin-bottom: 24px;
        }

        /* ─── OPTIONS ────────────────────────────────────────────── */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 520px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        .option-btn {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 13px 14px;
            border: 2px solid var(--ink);
            background: var(--white);
            color: var(--ink);
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 600;
            line-height: 1.5;
            cursor: pointer;
            text-align: left;
            transition: transform .1s, box-shadow .1s, background .15s;
            position: relative;
        }

        .option-btn:hover:not(:disabled) {
            background: var(--yellow);
            transform: translate(-2px,-2px);
            box-shadow: 4px 4px 0 var(--ink);
        }

        .option-btn.selected {
            background: var(--ink);
            color: var(--white);
            transform: none;
            box-shadow: none;
        }

        .option-btn.correct-ans {
            background: var(--green);
            border-color: var(--green);
            color: var(--white);
        }

        .option-btn.wrong-ans {
            background: var(--red);
            border-color: var(--red);
            color: var(--white);
        }

        .opt-letter {
            font-family: var(--font-display);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: .05em;
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            border: 2px solid currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1px;
        }

        .option-btn:disabled { cursor: default; opacity: .85; }

        /* ─── THEORY TEXTAREA ────────────────────────────────────── */
        .theory-box {
            width: 100%;
            min-height: 160px;
            border: 2px solid var(--ink);
            background: var(--bg);
            padding: 14px 16px;
            font-family: var(--font-hand);
            font-size: 16px;
            color: var(--ink);
            resize: vertical;
            outline: none;
            transition: box-shadow .15s;
        }
        .theory-box:focus {
            box-shadow: var(--shadow);
        }

        /* ─── FEEDBACK STRIP ─────────────────────────────────────── */
        .feedback-strip {
            display: none;
            padding: 10px 28px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .06em;
            border: 2.5px solid var(--ink);
            border-top: none;
        }
        .feedback-strip.correct { background: var(--green); color: var(--white); display: block; }
        .feedback-strip.wrong   { background: var(--red);   color: var(--white); display: block; }
        .feedback-strip .expl   { font-weight: 400; margin-top: 4px; font-size: 12px; opacity: .9; }

        /* Explanation lines (array items) */
        .expl-line {
            margin: 0;
            padding: 2px 0;
            font-weight: 400;
            font-size: 12px;
            line-height: 1.65;
            opacity: .92;
        }
        .expl-line + .expl-line { margin-top: 5px; }

        /* Hint row — shown before submit */
        .hint-row {
            margin-top: 14px;
            padding: 10px 14px;
            background: var(--off);
            border: 1.5px dashed var(--ruled);
            display: flex;
            gap: 10px;
            align-items: flex-start;
            font-size: 12px;
            line-height: 1.55;
            color: var(--ink);
            opacity: .8;
        }
        .hint-lbl {
            font-family: var(--font-display);
            font-size: 9px;
            font-weight: 900;
            letter-spacing: .1em;
            text-transform: uppercase;
            background: var(--ink);
            color: var(--white);
            padding: 2px 7px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* ─── NAV BAR ────────────────────────────────────────────── */
        .nav-bar {
            background: var(--off);
            border: 2.5px solid var(--ink);
            border-top: none;
            padding: 14px 20px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 10px;
        }

        .nav-bar .nav-left  { justify-self: start; }
        .nav-bar .nav-mid   { justify-self: center; }
        .nav-bar .nav-right { justify-self: end; }

        /* ─── BUTTONS ────────────────────────────────────────────── */
        .btn {
            font-family: var(--font-display);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: .07em;
            text-transform: uppercase;
            border: 2.5px solid var(--ink);
            padding: 10px 18px;
            cursor: pointer;
            transition: transform .1s, box-shadow .1s;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--white);
            color: var(--ink);
        }

        .btn:hover:not(:disabled) {
            transform: translate(-2px,-2px);
            box-shadow: var(--shadow);
        }

        .btn:disabled {
            opacity: .35;
            cursor: default;
            transform: none;
            box-shadow: none;
        }

        .btn-yellow { background: var(--yellow); }
        .btn-ink    { background: var(--ink); color: var(--white); }
        .btn-green  { background: var(--green); color: var(--white); border-color: var(--green); }
        .btn-red    { background: var(--red);   color: var(--white); border-color: var(--red); }

        /* Quit link */
        .quit-link {
            font-family: var(--font-mono);
            font-size: 11px;
            font-weight: 700;
            text-decoration: none;
            color: var(--ink);
            letter-spacing: .05em;
            opacity: .55;
            transition: opacity .15s;
        }
        .quit-link:hover { opacity: 1; }

        /* ─── RESULTS SCREEN ─────────────────────────────────────── */
        #results-screen {
            display: none;
            flex-direction: column;
        }

        .results-header {
            background: var(--ink);
            color: var(--white);
            padding: 32px 28px 24px;
            border: 2.5px solid var(--ink);
            text-align: center;
        }

        .results-header .eyebrow {
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--yellow);
            margin-bottom: 8px;
        }

        .score-display {
            font-family: var(--font-display);
            font-size: clamp(48px, 12vw, 80px);
            font-weight: 900;
            line-height: 1;
            margin: 10px 0 6px;
        }

        .score-label {
            font-family: var(--font-mono);
            font-size: 12px;
            letter-spacing: .1em;
            text-transform: uppercase;
            opacity: .7;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border: 2.5px solid var(--ink);
            border-top: none;
        }

        .res-stat {
            padding: 18px 16px;
            text-align: center;
            border-right: 2px solid var(--ink);
        }
        .res-stat:last-child { border-right: none; }
        .res-stat strong {
            font-family: var(--font-display);
            font-size: 24px;
            font-weight: 900;
            display: block;
        }
        .res-stat span {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            opacity: .6;
        }

        .res-stat.green strong { color: var(--green); }
        .res-stat.red   strong { color: var(--red); }

        .review-list {
            border: 2.5px solid var(--ink);
            border-top: none;
        }

        .review-item {
            padding: 16px 24px;
            border-bottom: 1.5px solid var(--ruled);
            display: flex;
            gap: 14px;
            align-items: flex-start;
            font-size: 13px;
            line-height: 1.6;
        }
        .review-item:last-child { border-bottom: none; }

        .review-q-num {
            font-family: var(--font-display);
            font-size: 10px;
            font-weight: 900;
            letter-spacing: .06em;
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border: 2px solid var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
        }
        .review-q-num.rq-ok  { background: var(--green); border-color: var(--green); color: var(--white); }
        .review-q-num.rq-bad { background: var(--red);   border-color: var(--red);   color: var(--white); }
        .review-q-num.rq-skip{ background: var(--ruled); }

        .review-ans {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .04em;
            opacity: .65;
            margin-top: 3px;
        }
        .review-ans.ok  { color: var(--green); opacity: 1; }
        .review-ans.bad { color: var(--red);   opacity: 1; }

        .results-actions {
            background: var(--off);
            border: 2.5px solid var(--ink);
            border-top: none;
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        /* ─── LOADING STATE ──────────────────────────────────────── */
        #loading-state {
            padding: 80px 28px;
            text-align: center;
            border: 2.5px solid var(--ink);
            background: var(--white);
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--ruled);
            border-top-color: var(--ink);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #loading-state p {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            opacity: .55;
        }

        /* ─── EMPTY / ERROR STATE ────────────────────────────────── */
        .state-msg {
            padding: 60px 28px;
            text-align: center;
            border: 2.5px solid var(--ink);
            background: var(--white);
            border-top: none;
        }
        .state-msg h3 {
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 900;
            margin-bottom: 8px;
        }
        .state-msg p { font-size: 12px; opacity: .6; line-height: 1.6; }

        /* ─── CONFIRM MODAL ──────────────────────────────────────── */
        #pp-confirm-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(10,10,10,.55);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        #pp-confirm-overlay.open { display: flex; }

        .pp-confirm-box {
            background: var(--bg);
            border: 2.5px solid var(--ink);
            box-shadow: 6px 6px 0 var(--ink);
            max-width: 400px; width: 100%;
            padding: 28px 24px 22px;
            font-family: var(--font-mono);
        }
        .pp-confirm-title {
            font-family: var(--font-display);
            font-size: 13px; font-weight: 900;
            letter-spacing: .04em; text-transform: uppercase;
            margin-bottom: 10px;
        }
        .pp-confirm-body {
            font-size: 13px; line-height: 1.65;
            margin-bottom: 20px; color: var(--ink);
        }
        .pp-confirm-ftr {
            display: flex; gap: 10px; justify-content: flex-end;
        }

        /* ─── RESPONSIVE ─────────────────────────────────────────── */
        @media (max-width: 600px) {
            .question-card { padding: 24px 18px 20px; }
            .nav-bar { padding: 12px 14px; }
            .exam-header { padding: 16px 18px 14px; }
            .q-counter-row { padding: 8px 18px; }
            .results-grid { grid-template-columns: repeat(3,1fr); }
        }
    </style>
</head>
<body>

<!-- ── QUIZ SCREEN ─────────────────────────────────────────── -->
<div class="quiz-shell" id="quiz-screen">

    <!-- Header -->
    <div class="exam-header">
        <div class="exam-header-left">
            <div class="exam-eyebrow">Prep Portal &middot; WASSCE</div>
            <h1 id="display-subject">Loading&hellip;</h1>
        </div>
        <div class="exam-meta" id="display-meta">—</div>
    </div>

    <!-- Progress -->
    <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
    </div>

    <!-- Counter + dot map -->
    <div class="q-counter-row">
        <span class="q-label" id="q-counter-label">Q — of —</span>
        <div class="q-dots" id="q-dots"></div>
    </div>

    <!-- Loading placeholder -->
    <div id="loading-state">
        <div class="loading-spinner"></div>
        <p>Loading questions&hellip;</p>
    </div>

    <!-- Question card (hidden until loaded) -->
    <div class="question-card" id="question-card" style="display:none">
        <span class="q-number-badge" id="q-number-badge">Q 1</span>
        <div class="q-text" id="q-text"></div>
        <div id="q-options"></div>
    </div>

    <!-- Feedback strip -->
    <div class="feedback-strip" id="feedback-strip">
        <span id="feedback-label"></span>
        <div class="expl" id="feedback-expl"></div>
    </div>

    <!-- Nav bar -->
    <div class="nav-bar" id="nav-bar" style="display:none">
        <div class="nav-left">
            <a href="#" class="quit-link" id="quit-link">← Quit</a>
        </div>
        <div class="nav-mid">
            <button class="btn" id="prev-btn" onclick="navigate(-1)" disabled>
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 1L3 6l5 5"/></svg>
                Prev
            </button>
        </div>
        <div class="nav-right" style="display:flex;gap:8px;align-items:center;">
            <button class="btn btn-yellow" id="next-btn" onclick="navigate(1)">
                Next
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 1l5 5-5 5"/></svg>
            </button>
            <button class="btn btn-ink" id="submit-btn" onclick="confirmSubmit()" style="display:none">
                Submit
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6h8M7 3l3 3-3 3"/></svg>
            </button>
        </div>
    </div>

</div>

<!-- ── RESULTS SCREEN ──────────────────────────────────────── -->
<div class="quiz-shell" id="results-screen" style="display:none;flex-direction:column;">

    <div class="results-header">
        <div class="eyebrow">Exam Complete</div>
        <div class="score-display" id="res-score">—</div>
        <div class="score-label" id="res-grade">—</div>
    </div>

    <div class="results-grid">
        <div class="res-stat green">
            <strong id="res-correct">0</strong>
            <span>Correct</span>
        </div>
        <div class="res-stat red">
            <strong id="res-wrong">0</strong>
            <span>Wrong</span>
        </div>
        <div class="res-stat">
            <strong id="res-skipped">0</strong>
            <span>Skipped</span>
        </div>
    </div>

    <div class="review-list" id="review-list"></div>

    <div class="results-actions">
        <button class="btn" onclick="window.history.back()">← Back to Setup</button>
        <button class="btn btn-yellow" onclick="retakeQuiz()">Retake Quiz</button>
    </div>

</div>

<!-- ── SUBMIT CONFIRM MODAL ────────────────────────────────── -->
<div id="pp-confirm-overlay">
    <div class="pp-confirm-box">
        <div class="pp-confirm-title">Submit Paper?</div>
        <p class="pp-confirm-body" id="confirm-body">
            You have answered — of — questions. Unanswered questions will be marked wrong.
        </p>
        <div class="pp-confirm-ftr">
            <button class="btn" onclick="closeConfirm()">Go Back</button>
            <button class="btn btn-ink" onclick="submitQuiz()">Yes, Submit</button>
        </div>
    </div>
</div>

<script>
    // ─── 1. STATE ────────────────────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const config = {
        year:     urlParams.get('year'),
        subjects: urlParams.get('subjects')?.split(',') || [],
        types:    urlParams.get('types')?.split(',')    || []
    };

    let allQuestions = [];   // { subject, type, question, options?, _answer, explanation? }
    let currentIndex = 0;
    let userAnswers  = {};   // index -> selected option text | textarea string
    let submitted    = false;

    // ─── 2. ANSWER RESOLVER ──────────────────────────────────────
    /**
     * Resolves the correct answer TEXT from a question object.
     * Handles every common field name and both text-based and
     * index-based (0/1/2/3 or "A"/"B"/"C"/"D") answer formats.
     * Returns the answer string, or null if none can be found.
     */
    function resolveAnswer(q) {
        const opts = q.options || [];

        // ── Index-based fields (number 0–4) ──────────────────────
        // correctIndex is the most common in this codebase
        for (const field of ['correctIndex', 'correct_index', 'answerIndex', 'answer_index']) {
            if (q[field] !== undefined && q[field] !== null) {
                const idx = parseInt(q[field], 10);
                if (!isNaN(idx) && opts[idx] !== undefined) return opts[idx];
            }
        }

        // ── Text / letter fields ──────────────────────────────────
        const raw = q.answer ?? q.correct ?? q.correctAnswer ??
                    q.correctOption ?? q.correct_answer ?? q.key ?? null;

        if (raw === null || raw === undefined) return null;

        if (typeof raw === 'number') return opts[raw] ?? null;

        const str = String(raw).trim();

        // Single letter A/B/C/D/E → map to options index
        if (/^[A-Ea-e]$/.test(str)) {
            return opts[str.toUpperCase().charCodeAt(0) - 65] ?? null;
        }

        // Numeric string "0"/"1"/"2"/"3" → index
        if (/^\d$/.test(str)) return opts[parseInt(str, 10)] ?? null;

        return str || null;
    }

    // ─── 3. BOOTSTRAP ────────────────────────────────────────────
    document.getElementById('display-meta').textContent =
        `WASSCE ${config.year || '—'} • ${(config.types || []).join(' & ').toUpperCase()}`;
    document.getElementById('display-subject').textContent =
        (config.subjects || []).join(' & ') || 'Practice Paper';

    document.getElementById('quit-link').addEventListener('click', (e) => {
        e.preventDefault();
        window.history.back();
    });

    function normalizeName(name) {
        return name.toLowerCase().replace(/\s+/g, '');
    }

    function injectScript(src) {
        return new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = src;
            s.onload = resolve;
            s.onerror = reject;
            document.head.appendChild(s);
        });
    }

    async function loadAndRender() {
        const loadedSets = [];

        for (const sub of config.subjects) {
            const subKey = normalizeName(sub);
            for (const type of config.types) {
                const scriptPath = `./${subKey}/${config.year}/${type}.js`;
                try {
                    await injectScript(scriptPath);
                    const varName = `${subKey}${type.charAt(0).toUpperCase() + type.slice(1)}`;
                    let data;
                    try { data = window[varName] || eval(varName); } catch (_) {}
                    if (data) loadedSets.push({ sub, type, data });
                } catch (_) {
                    console.warn(`Could not load: ${scriptPath}`);
                }
            }
        }

        for (const { sub, type, data } of loadedSets) {
            if (type === 'objective') {
                data.forEach(q => {
                    const obj = { ...q, subject: sub, type };
                    obj._answer = resolveAnswer(obj); // pre-resolve once
                    allQuestions.push(obj);
                });
            } else {
                Object.values(data).forEach(qText => allQuestions.push({
                    subject: sub, type, question: qText, _answer: null
                }));
            }
        }

        document.getElementById('loading-state').style.display = 'none';

        if (allQuestions.length === 0) {
            document.getElementById('question-card').style.display = 'flex';
            document.getElementById('question-card').innerHTML = `
                <div class="state-msg">
                    <h3>No Questions Found</h3>
                    <p>Could not load question data for this selection.<br>Check the file paths and variable names.</p>
                </div>`;
            return;
        }

        buildDotMap();
        renderQuestion(0);
        document.getElementById('question-card').style.display = 'flex';
        document.getElementById('nav-bar').style.display = 'grid';
    }

    // ─── 4. DOT MAP ──────────────────────────────────────────────
    function buildDotMap() {
        const container = document.getElementById('q-dots');
        container.innerHTML = '';
        allQuestions.forEach((_, i) => {
            const dot = document.createElement('button');
            dot.className = 'q-dot';
            dot.title = `Question ${i + 1}`;
            // Allow dot navigation always — useful for reviewing after submit
            dot.addEventListener('click', () => renderQuestion(i));
            container.appendChild(dot);
        });
        updateDots();
    }

    function updateDots() {
        const dots = document.querySelectorAll('.q-dot');
        dots.forEach((d, i) => {
            d.classList.remove('answered', 'current', 'correct', 'wrong');
            const q      = allQuestions[i];
            const chosen = userAnswers[i];
            const ans    = q._answer;

            if (submitted && q.type === 'objective') {
                if (chosen === undefined || chosen === null) {
                    // unanswered — leave plain (grey)
                } else if (ans === null) {
                    // no answer key — just show as answered
                    d.classList.add('answered');
                } else if (chosen === ans) {
                    d.classList.add('correct');
                } else {
                    d.classList.add('wrong');
                }
            } else if (submitted && q.type !== 'objective') {
                if (chosen) d.classList.add('answered');
            } else {
                // pre-submit
                if (i === currentIndex)          d.classList.add('current');
                else if (chosen !== undefined)   d.classList.add('answered');
            }
        });
    }

    // ─── 5. RENDER QUESTION ──────────────────────────────────────
    function renderQuestion(idx) {
        currentIndex = idx;
        const q     = allQuestions[idx];
        const total = allQuestions.length;
        const ans   = q._answer;

        document.getElementById('q-counter-label').textContent = `Q ${idx + 1} of ${total}`;
        document.getElementById('progress-fill').style.width   = `${((idx + 1) / total) * 100}%`;
        document.getElementById('q-number-badge').textContent  =
            `Q ${idx + 1}  •  ${q.subject}  •  ${q.type.toUpperCase()}`;

        // Use innerHTML so MathJax can parse $...$ inside question text
        document.getElementById('q-text').innerHTML = escapeHtmlExceptMath(q.question);

        const optWrap = document.getElementById('q-options');
        optWrap.innerHTML = '';

        if (q.type === 'objective') {
            const grid     = document.createElement('div');
            grid.className = 'options-grid';
            const letters  = ['A','B','C','D','E'];

            (q.options || []).forEach((opt, oi) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';

                if (submitted) {
                    btn.disabled = true;
                    if (ans !== null && opt === ans) {
                        btn.classList.add('correct-ans');
                    } else if (userAnswers[idx] === opt && opt !== ans) {
                        btn.classList.add('wrong-ans');
                    } else if (ans === null && userAnswers[idx] === opt) {
                        btn.classList.add('selected');
                    }
                } else if (userAnswers[idx] === opt) {
                    btn.classList.add('selected');
                }

                // innerHTML so MathJax renders $...$ in option text
                btn.innerHTML = `<span class="opt-letter">${letters[oi] || oi + 1}</span><span>${escapeHtmlExceptMath(opt)}</span>`;
                btn.addEventListener('click', () => selectOption(opt, btn, grid, idx));
                grid.appendChild(btn);
            });
            optWrap.appendChild(grid);

            // Hint row (shown before submit)
            if (!submitted && q.hint) {
                const hintEl = document.createElement('div');
                hintEl.className = 'hint-row';
                hintEl.innerHTML = `<span class="hint-lbl">Hint</span><span>${escapeHtmlExceptMath(q.hint)}</span>`;
                optWrap.appendChild(hintEl);
            }
        } else {
            const ta = document.createElement('textarea');
            ta.className   = 'theory-box';
            ta.placeholder = 'Write your answer here…';
            ta.value       = userAnswers[idx] || '';
            if (submitted) ta.disabled = true;
            ta.addEventListener('input', () => {
                userAnswers[idx] = ta.value;
                updateDots();
            });
            optWrap.appendChild(ta);
        }

        renderFeedback(idx);

        document.getElementById('prev-btn').disabled = (idx === 0);
        const isLast = (idx === total - 1);
        document.getElementById('next-btn').style.display   = isLast ? 'none'        : 'inline-flex';
        document.getElementById('submit-btn').style.display = isLast ? 'inline-flex' : 'none';

        updateDots();

        // Typeset MathJax on the whole card after DOM update
        typeset();
    }

    // Escape HTML but leave $...$ math delimiters intact for MathJax
    function escapeHtmlExceptMath(str) {
        if (!str) return '';
        // Split on $...$ patterns, escape HTML on non-math parts only
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Safe MathJax typeset call — no-ops if MathJax not yet loaded
    function typeset(el) {
        if (typeof MathJax === 'undefined' || !MathJax.typesetPromise) return;
        const targets = el ? [el] : [
            document.getElementById('question-card'),
            document.getElementById('feedback-strip')
        ];
        MathJax.typesetPromise(targets).catch(err => console.warn('MathJax error:', err));
    }

    // ─── 6. FEEDBACK STRIP ───────────────────────────────────────
    function renderFeedback(idx) {
        const strip = document.getElementById('feedback-strip');
        const label = document.getElementById('feedback-label');
        const expl  = document.getElementById('feedback-expl');
        const q     = allQuestions[idx];
        const ans   = q._answer;

        strip.className = 'feedback-strip'; // reset
        expl.innerHTML  = '';

        if (!submitted || q.type !== 'objective') return;

        const chosen = userAnswers[idx];

        // Helper: render explanation (string or string[]) as HTML paragraphs
        function renderExpl(raw) {
            if (!raw) return '';
            const lines = Array.isArray(raw) ? raw : [raw];
            return lines.map(l => `<p class="expl-line">${escapeHtmlExceptMath(l)}</p>`).join('');
        }

        if (!chosen) {
            strip.classList.add('wrong');
            label.textContent = 'Not answered.';
            expl.innerHTML    = ans
                ? `<p class="expl-line">Correct answer: <strong>${escapeHtmlExceptMath(ans)}</strong></p>`
                : '<p class="expl-line">No answer key available for this question.</p>';
            return;
        }

        if (ans === null) {
            strip.classList.add('correct');
            label.textContent = `You selected: ${chosen}`;
            expl.innerHTML    = '<p class="expl-line">No answer key — cannot verify.</p>';
            return;
        }

        if (chosen === ans) {
            strip.classList.add('correct');
            label.textContent = 'Correct!';
            expl.innerHTML    = renderExpl(q.explanation);
        } else {
            strip.classList.add('wrong');
            label.textContent = `Wrong. You chose: ${chosen}`;
            expl.innerHTML    =
                `<p class="expl-line">Correct answer: <strong>${escapeHtmlExceptMath(ans)}</strong></p>` +
                renderExpl(q.explanation);
        }
    }

    // ─── 7. SELECT OPTION ────────────────────────────────────────
    function selectOption(opt, btn, grid, idx) {
        if (submitted) return;
        grid.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        userAnswers[idx] = opt;
        updateDots();
    }

    // ─── 8. NAVIGATE ─────────────────────────────────────────────
    function navigate(delta) {
        const next = currentIndex + delta;
        if (next < 0 || next >= allQuestions.length) return;
        renderQuestion(next);
    }

    // ─── 9. SUBMIT CONFIRM ───────────────────────────────────────
    function confirmSubmit() {
        const answered   = Object.keys(userAnswers).filter(k => userAnswers[k] !== undefined && userAnswers[k] !== '').length;
        const total      = allQuestions.length;
        const unanswered = total - answered;

        document.getElementById('confirm-body').textContent =
            `You have answered ${answered} of ${total} question${total !== 1 ? 's' : ''}.` +
            (unanswered > 0
                ? ` ${unanswered} unanswered question${unanswered !== 1 ? 's' : ''} will be marked as skipped.`
                : ' Ready to submit?');

        document.getElementById('pp-confirm-overlay').classList.add('open');
    }

    function closeConfirm() {
        document.getElementById('pp-confirm-overlay').classList.remove('open');
    }

    // ─── 10. SUBMIT ──────────────────────────────────────────────
    function submitQuiz() {
        closeConfirm();
        submitted = true;

        renderQuestion(currentIndex);

        const subBtn = document.getElementById('submit-btn');
        subBtn.disabled    = true;
        subBtn.textContent = 'Submitted';

        setTimeout(showResults, 900);
    }

    // ─── 11. RESULTS ─────────────────────────────────────────────
    function showResults() {
        document.getElementById('quiz-screen').style.display    = 'none';
        document.getElementById('results-screen').style.display = 'flex';

        // Only score questions that have a resolvable answer key
        const scorable = allQuestions.filter((q, i) =>
            q.type === 'objective' && q._answer !== null
        );
        const noKey    = allQuestions.filter((q, i) =>
            q.type === 'objective' && q._answer === null
        );

        let correct = 0, wrong = 0, skipped = 0;

        allQuestions.forEach((q, i) => {
            if (q.type !== 'objective') return;
            const chosen = userAnswers[i];
            const ans    = q._answer;

            if (chosen === undefined || chosen === null || chosen === '') {
                skipped++;
            } else if (ans === null) {
                // No key — don't penalise or reward, just ignore in score
            } else if (chosen === ans) {
                correct++;
            } else {
                wrong++;
            }
        });

        const pct = scorable.length > 0
            ? Math.round((correct / scorable.length) * 100)
            : 0;

        document.getElementById('res-score').textContent   = scorable.length > 0 ? `${pct}%` : 'N/A';
        document.getElementById('res-correct').textContent = correct;
        document.getElementById('res-wrong').textContent   = wrong;
        document.getElementById('res-skipped').textContent = skipped;

        let grade;
        if (scorable.length === 0)  grade = 'No answer key — manual review needed.';
        else if (pct >= 80)         grade = 'Distinction — Excellent work!';
        else if (pct >= 65)         grade = 'Credit — Well done.';
        else if (pct >= 50)         grade = 'Pass — Room to improve.';
        else                        grade = 'Fail — Keep practising.';
        document.getElementById('res-grade').textContent = grade;

        // ── Review list ────────────────────────────────────────
        const reviewEl = document.getElementById('review-list');
        reviewEl.innerHTML = '';

        allQuestions.forEach((q, i) => {
            const item   = document.createElement('div');
            item.className = 'review-item';

            const numEl  = document.createElement('div');
            numEl.className = 'review-q-num';
            numEl.textContent = i + 1;

            const bodyEl = document.createElement('div');
            bodyEl.style.flex = '1';

            const qTextEl = document.createElement('div');
            qTextEl.style.cssText = 'font-size:12px;line-height:1.55;margin-bottom:4px;';
            qTextEl.textContent   = q.question.length > 130
                ? q.question.slice(0, 130) + '…'
                : q.question;

            const ansEl = document.createElement('div');
            ansEl.className = 'review-ans';

            if (q.type === 'objective') {
                const chosen = userAnswers[i];
                const ans    = q._answer;

                if (!chosen) {
                    numEl.classList.add('rq-skip');
                    ansEl.textContent = ans
                        ? `Not answered — Correct: ${ans}`
                        : 'Not answered — No answer key';
                } else if (ans === null) {
                    // answered but no key
                    numEl.classList.add('rq-skip');
                    ansEl.textContent = `You: ${chosen}  |  No answer key`;
                } else if (chosen === ans) {
                    numEl.classList.add('rq-ok');
                    ansEl.classList.add('ok');
                    ansEl.textContent = `Correct: ${chosen}`;
                } else {
                    numEl.classList.add('rq-bad');
                    ansEl.classList.add('bad');
                    ansEl.textContent = `You: ${chosen}  |  Correct: ${ans}`;
                }
            } else {
                numEl.classList.add(userAnswers[i] ? 'rq-ok' : 'rq-skip');
                ansEl.textContent = userAnswers[i] ? 'Theory — Answered' : 'Theory — Not answered';
            }

            bodyEl.appendChild(qTextEl);
            bodyEl.appendChild(ansEl);
            item.appendChild(numEl);
            item.appendChild(bodyEl);
            reviewEl.appendChild(item);
        });
    }

    // ─── 12. RETAKE ──────────────────────────────────────────────
    function retakeQuiz() {
        userAnswers  = {};
        currentIndex = 0;
        submitted    = false;

        document.getElementById('results-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display    = 'flex';

        const subBtn = document.getElementById('submit-btn');
        subBtn.disabled = false;
        subBtn.innerHTML = `Submit <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 6h8M7 3l3 3-3 3"/></svg>`;

        buildDotMap();
        renderQuestion(0);
    }

    // ─── KICK OFF ─────────────────────────────────────────────────
    loadAndRender();
</script>
</body>
