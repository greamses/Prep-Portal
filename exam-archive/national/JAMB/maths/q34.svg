<svg width="450" height="350" viewBox="0 0 450 350" xmlns="http://www.w3.org/2000/svg">
  <style>
    .axis { stroke: #333; stroke-width: 2; fill: none; }
    .grid { stroke: #e0e0e0; stroke-width: 1; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .curve-label { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
    .curve-x { stroke: #d32f2f; stroke-width: 2.5; fill: none; }
    .curve-y { stroke: #1976d2; stroke-width: 2.5; fill: none; }
    .curve-z { stroke: #388e3c; stroke-width: 2.5; fill: none; }
    .curve-bottom { stroke: #7b1fa2; stroke-width: 2; fill: none; stroke-dasharray: 4; }
  </style>

  <!-- Grid Lines -->
  <line x1="50" y1="50" x2="50" y2="300" class="grid" />
  <line x1="50" y1="300" x2="400" y2="300" class="grid" />
  
  <!-- Axes -->
  <path d="M50 40 L50 300 L410 300" class="axis" />
  <!-- Arrows -->
  <path d="M47 50 L50 40 L53 50 M400 297 L410 300 L400 303" fill="none" stroke="#333" stroke-width="2" />

  <!-- Labels -->
  <text x="225" y="340" text-anchor="middle" class="label">Temperature (°C)</text>
  <text x="20" y="175" text-anchor="middle" class="label" transform="rotate(-90, 20, 175)">Solubility (g/100g water)</text>
  
  <!-- Scale Markers -->
  <text x="50" y="315" text-anchor="middle" class="label">0</text>
  <text x="120" y="315" text-anchor="middle" class="label">20</text>
  <text x="190" y="315" text-anchor="middle" class="label">40</text>
  <text x="260" y="315" text-anchor="middle" class="label">60</text>
  <text x="330" y="315" text-anchor="middle" class="label">80</text>
  <text x="400" y="315" text-anchor="middle" class="label">100</text>

  <text x="35" y="305" text-anchor="end" class="label">0</text>
  <text x="35" y="230" text-anchor="end" class="label">20</text>
  <text x="35" y="155" text-anchor="end" class="label">40</text>
  <text x="35" y="80" text-anchor="end" class="label">60</text>

  <!-- Curve Z (Temperature Independent) -->
  <line x1="50" y1="155" x2="400" y2="155" class="curve-z" />
  <text x="410" y="160" class="curve-label" fill="#388e3c">Z</text>

  <!-- Curve Y (Steadily Increasing) -->
  <path d="M50 260 L400 80" class="curve-y" />
  <text x="410" y="85" class="curve-label" fill="#1976d2">Y</text>

  <!-- Curve X (Steeply Increasing) -->
  <path d="M50 290 Q 200 250 400 50" class="curve-x" />
  <text x="405" y="45" class="curve-label" fill="#d32f2f">X</text>

  <!-- Extra Bottom Curve (Bell Shape) -->
  <path d="M50 300 C 150 200, 300 200, 400 300" class="curve-bottom" />
</svg>