<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Top Label -->
  <text x="150" y="30" font-family="Arial" font-size="12" text-anchor="middle">NOT DRAWN TO SCALE</text>
  
  <!-- Parallel Lines and Transversal -->
  <line x1="100" y1="100" x2="250" y2="70" stroke="black" stroke-width="2" />
  <line x1="100" y1="100" x2="200" y2="200" stroke="black" stroke-width="2" />
  <line x1="200" y1="200" x2="50" y2="230" stroke="black" stroke-width="2" />
  
  <!-- Angle Arcs -->
  <path d="M 121 121 A 30 30 0 0 0 129 94" fill="none" stroke="black" stroke-width="2" />
  <path d="M 171 206 A 30 30 0 0 1 179 179" fill="none" stroke="black" stroke-width="2" />
  
  <!-- Point Labels -->
  <text x="255" y="65" font-family="Arial" font-size="18">M</text>
  <text x="80" y="95" font-family="Arial" font-size="18">N</text>
  <text x="210" y="215" font-family="Arial" font-size="18">P</text>
  <text x="35" y="245" font-family="Arial" font-size="18">Q</text>
  
  <!-- Angle Text -->
  <text x="135" y="115" font-family="Arial" font-size="16">2x</text>
  <text x="110" y="195" font-family="Arial" font-size="16">(3x - 50°)</text>
  
  <!-- Double Arrows on Parallel Lines -->
  <!-- On MN -->
  <polyline points="185,78 175,85 183,93" fill="none" stroke="black" stroke-width="1.5" />
  <polyline points="195,76 185,83 193,91" fill="none" stroke="black" stroke-width="1.5" />
  
  <!-- On PQ -->
  <polyline points="135,208 125,215 133,223" fill="none" stroke="black" stroke-width="1.5" />
  <polyline points="145,206 135,213 143,221" fill="none" stroke="black" stroke-width="1.5" />
</svg>