<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D PDF Flipbook Viewer</title>

    <!-- PDF.js for rendering PDF documents to canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <!-- ES Module Import Map aligned to 0.152.2 for consistent mergeGeometries exports -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.152.2",
          "three/": "https://esm.sh/three@0.152.2/",
          "quick_flipbook": "https://esm.sh/quick_flipbook@1.1.3?bundle&external=three"
        }
      }
    </script>

    <style>
      :root {
        --accent-color: #a3e635; /* Vibrant Lemon/Lime Green */
        --bg-color: #111111; /* Deep modern dark backdrop */
        --ui-bg: rgba(20, 20, 20, 0.85);
        --border-glow: rgba(163, 230, 53, 0.3);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        user-select: none;
      }

      body,
      html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: var(--bg-color);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        color: #ffffff;
      }

      #webgl-container {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }

      /* UI Overlays */
      #ui-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 20px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--ui-bg);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        padding: 12px 24px;
        border-radius: 12px;
        pointer-events: auto;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      }

      header h1 {
        font-size: 1.1rem;
        letter-spacing: 2px;
        text-transform: uppercase;
        font-weight: 700;
        color: #ffffff;
      }

      header h1 span {
        color: var(--accent-color);
      }

      .upload-btn-wrapper {
        position: relative;
        overflow: hidden;
        display: inline-block;
      }

      .btn {
        border: 2px solid var(--accent-color);
        color: var(--accent-color);
        background-color: transparent;
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .btn:hover {
        background-color: var(--accent-color);
        color: var(--bg-color);
        box-shadow: 0 0 15px var(--border-glow);
      }

      .upload-btn-wrapper input[type="file"] {
        font-size: 100px;
        position: absolute;
        left: 0;
        top: 0;
        opacity: 0;
        cursor: pointer;
      }

      /* Navigation Arrows on Left/Right edges */
      .nav-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 60px;
        height: 60px;
        background: var(--ui-bg);
        border: 1px solid rgba(163, 230, 53, 0.1);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        pointer-events: auto;
        transition: all 0.3s ease;
        z-index: 15;
      }

      .nav-arrow:hover {
        border-color: var(--accent-color);
        box-shadow: 0 0 10px var(--border-glow);
      }

      .nav-arrow svg {
        fill: #ffffff;
        width: 24px;
        height: 24px;
        transition: fill 0.3s ease;
      }

      .nav-arrow:hover svg {
        fill: var(--accent-color);
      }

      #arrow-prev {
        left: 30px;
      }

      #arrow-next {
        right: 30px;
      }

      /* Bottom Controls Bar */
      footer {
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: auto;
        z-index: 12;
      }

      .controls-panel {
        display: flex;
        align-items: center;
        gap: 20px;
        background: var(--ui-bg);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        padding: 10px 24px;
        border-radius: 30px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
      }

      .page-indicator {
        font-size: 0.9rem;
        font-weight: 500;
        letter-spacing: 1px;
        min-width: 100px;
        text-align: center;
      }

      .control-btn {
        background: transparent;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffffff;
        transition: color 0.3s ease;
      }

      .control-btn:hover {
        color: var(--accent-color);
      }

      .control-btn svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      /* Crisp Loader Display */
      #loader-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(17, 17, 17, 0.95);
        z-index: 100;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: opacity 0.5s ease;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(163, 230, 53, 0.1);
        border-radius: 50%;
        border-top-color: var(--accent-color);
        animation: spin 1s ease-in-out infinite;
        margin-bottom: 20px;
      }

      #loader-text {
        font-size: 1rem;
        letter-spacing: 1.5px;
        color: var(--accent-color);
        font-weight: 500;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Mobile Responsive UI tweaks */
      @media (max-width: 768px) {
        #ui-container {
          padding: 10px;
        }
        header {
          padding: 10px 16px;
        }
        header h1 {
          font-size: 0.9rem;
        }
        .btn {
          padding: 6px 12px;
          font-size: 0.75rem;
        }
        .nav-arrow {
          width: 44px;
          height: 44px;
        }
        #arrow-prev {
          left: 10px;
        }
        #arrow-next {
          right: 10px;
        }
        .controls-panel {
          gap: 12px;
          padding: 8px 16px;
        }
        .page-indicator {
          font-size: 0.8rem;
          min-width: 80px;
        }
      }
    </style>
  </head>
  <body>
    <div id="loader-overlay">
      <div class="spinner"></div>
      <div id="loader-text">Loading Knitting Catalog...</div>
    </div>

    <div id="webgl-container"></div>

    <div id="ui-container">
      <header>
        <h1>Knitting<span>3D</span></h1>
        <div class="upload-btn-wrapper">
          <button class="btn">Upload PDF</button>
          <input type="file" id="pdf-uploader" accept="application/pdf" />
        </div>
      </header>

      <div class="nav-arrow" id="arrow-prev" title="Previous Page">
        <svg viewBox="0 0 24 24">
          <path d="M15.41 16.58L10.83 12l4.58-4.58L14 6l-6 6 6 6 1.41-1.42z" />
        </svg>
      </div>
      <div class="nav-arrow" id="arrow-next" title="Next Page">
        <svg viewBox="0 0 24 24">
          <path d="M8.59 16.58L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.42z" />
        </svg>
      </div>

      <footer>
        <div class="controls-panel">
          <button class="control-btn" id="btn-first" title="First Page">
            <svg viewBox="0 0 24 24">
              <path
                d="M18.41 16.59L13.82 12l4.59-4.59L17 6l-6 6 6 6 1.41-1.41M6 6h2v12H6V6z"
              />
            </svg>
          </button>

          <span class="page-indicator" id="page-indicator">0 / 0</span>

          <button class="control-btn" id="btn-last" title="Last Page">
            <svg viewBox="0 0 24 24">
              <path
                d="M5.59 7.41L10.18 12l-4.59 4.59L7 18l6-6-6-6-1.41 1.41M16 6h2v12h-2V6z"
              />
            </svg>
          </button>
        </div>
      </footer>
    </div>

    <!-- Application Engine Logic -->
    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/examples/jsm/controls/OrbitControls.js";
      import { FlipBook } from "quick_flipbook";

      // Set PDF.js Web Worker Source path
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";

      // Core Application Context
      let scene, camera, renderer, clock, controls;
      let book = null;
      let loadedTextures = [];

      let currentPage = 0; // Precise current page index (0 to totalPages-1)
      let totalPages = 0;
      let targetCameraX = 0; // Smooth horizontal panning destination
      let defaultCameraZ = 2.4; // Base responsive camera depth
      let isMobile = false;
      let panOffset = 0.63; // Math offset to center single pages on screen

      // Audio Context & Synthesizer Engine
      let audioCtx = null;

      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === "suspended") {
          audioCtx.resume();
        }
      }

      // Web Audio synthesized sound for paper folding rustle
      function playFlipSound() {
        if (!audioCtx) return;
        initAudio();

        const duration = 0.5;
        const bufferSize = audioCtx.sampleRate * duration;
        const buffer = audioCtx.createBuffer(
          1,
          bufferSize,
          audioCtx.sampleRate,
        );
        const data = buffer.getChannelData(0);

        // Synthesizing white noise sample
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }

        const noiseNode = audioCtx.createBufferSource();
        noiseNode.buffer = buffer;

        // Lowpass and Bandpass combination to sound like paper
        const filterNode = audioCtx.createBiquadFilter();
        filterNode.type = "bandpass";
        filterNode.frequency.setValueAtTime(1000, audioCtx.currentTime);
        filterNode.frequency.exponentialRampToValueAtTime(
          120,
          audioCtx.currentTime + duration,
        );
        filterNode.Q.setValueAtTime(4.0, audioCtx.currentTime);

        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(0.001, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(
          0.15,
          audioCtx.currentTime + 0.06,
        );
        gainNode.gain.exponentialRampToValueAtTime(
          0.001,
          audioCtx.currentTime + duration,
        );

        noiseNode.connect(filterNode);
        filterNode.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        noiseNode.start();
      }

      // Web Audio synthesized sound for camera horizontal pan movement
      function playPanSound() {
        if (!audioCtx) return;
        initAudio();

        const duration = 0.35;
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(120, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(
          65,
          audioCtx.currentTime + duration,
        );

        gainNode.gain.setValueAtTime(0.001, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(
          0.03,
          audioCtx.currentTime + 0.08,
        );
        gainNode.gain.exponentialRampToValueAtTime(
          0.001,
          audioCtx.currentTime + duration,
        );

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + duration);
      }

      // Setup WebGL Scene
      function initWebGL() {
        const container = document.getElementById("webgl-container");

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111); // Modern dark theme canvas backdrop

        camera = new THREE.PerspectiveCamera(
          45,
          window.innerWidth / window.innerHeight,
          0.1,
          100,
        );
        updateCameraZ();
        camera.position.set(0, 0, defaultCameraZ);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        clock = new THREE.Clock();

        // Setup OrbitControls for native Zoom and Pan support
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableRotate = false; // Restrict rotation (keep face-on upright reading angle)
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.minDistance = 0.5;
        controls.maxDistance = 6.0;

        // Map gestures: left click/touch pans, scroll zooms
        controls.mouseButtons = {
          LEFT: THREE.MOUSE.PAN,
          MIDDLE: THREE.MOUSE.DOLLY,
          RIGHT: THREE.MOUSE.ROTATE,
        };
        controls.touches = {
          ONE: THREE.TOUCH.PAN,
          TWO: THREE.TOUCH.DOLLY_PAN,
        };

        // Lighting Design
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
        scene.add(ambientLight);

        // Spotlight to render 3D page curl folds
        const spotLight = new THREE.SpotLight(0xa3e635, 1.8);
        spotLight.position.set(0, 4, 3);
        spotLight.angle = Math.PI / 3.5;
        spotLight.penumbra = 0.8;
        spotLight.castShadow = true;
        scene.add(spotLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 0.35);
        fillLight.position.set(-3, -2, 1);
        scene.add(fillLight);

        checkMobile();
        animate();
      }

      // Release references to avoid GPU and RAM leaks
      function cleanupOldBook() {
        if (book) {
          scene.remove(book);
          book.dispose();
          book = null;
        }
        if (loadedTextures.length > 0) {
          loadedTextures.forEach((texture) => texture.dispose());
          loadedTextures = [];
        }
        currentPage = 0;
      }

      // Initialize Book Object Mesh using quick_flipbook
      function initBook(textures) {
        cleanupOldBook();
        loadedTextures = textures;

        book = new FlipBook({
          flipDuration: 0.75,
          yBetweenPages: 0.001,
          pageSubdivisions: 24,
        });

        // Adjust physical dimensions to match aspect ratio
        const canvasWidth = textures[0].image.width || 1024;
        const canvasHeight = textures[0].image.height || 1327;
        const aspect = canvasWidth / canvasHeight;

        // Scale multiplier to increase the book size for readability
        const baseScale = 1.65;
        book.scale.set(aspect * baseScale, baseScale, baseScale);

        // Calculate precise coordinate translation offset to frame a single page perfectly
        panOffset = (aspect * baseScale) / 2;

        // Rotate exactly 90 degrees (Math.PI / 2) on the X-axis to position upright
        book.rotation.x = Math.PI / 2;
        book.position.y = 0; // Centered vertically in viewport

        scene.add(book);
        book.setPages(textures);

        updateTargetCameraX();
        updateUI();
      }

      // Reset camera zoom/pan offsets back to responsive defaults before flipping
      function triggerPageFlip(flipAction) {
        if (controls) {
          controls.target.set(targetCameraX, 0, 0);
          updateCameraZ();
          camera.position.set(targetCameraX, 0, defaultCameraZ);
          controls.update();
        }
        flipAction();
      }

      // Check layout width boundaries on resize
      function checkMobile() {
        const wasMobile = isMobile;
        isMobile = window.innerWidth < 768;
        if (wasMobile !== isMobile) {
          updateCameraZ();
          if (controls) {
            camera.position.set(targetCameraX, 0, defaultCameraZ);
            controls.target.set(targetCameraX, 0, 0);
            controls.update();
          }
          updateTargetCameraX();
        }
      }

      // Determine Panning alignment value
      function updateTargetCameraX() {
        if (!isMobile) {
          targetCameraX = 0; // Centered straight down
        } else {
          // Shift camera on mobile layout depending on layout state
          if (currentPage === 0) {
            targetCameraX = panOffset; // Center Cover page on right
          } else if (currentPage === totalPages - 1 && totalPages % 2 === 0) {
            targetCameraX = -panOffset; // Center Back cover on left
          } else {
            targetCameraX = currentPage % 2 === 1 ? -panOffset : panOffset;
          }
        }
      }

      // Base responsive camera depth
      function updateCameraZ() {
        if (isMobile) {
          defaultCameraZ = 3.6;
        } else {
          defaultCameraZ = 2.4;
        }
      }

      // Render Frame and camera movement interpolation
      function animate() {
        requestAnimationFrame(animate);

        const delta = clock.getDelta();
        if (book) {
          book.animate(delta);
        }

        // Smoothly align OrbitControls target horizontally with our auto-pan target
        if (controls) {
          controls.target.x += (targetCameraX - controls.target.x) * 0.08;
          controls.update();
        }

        renderer.render(scene, camera);
      }

      // Multi-page navigation sequence triggers
      function goNext() {
        if (currentPage >= totalPages - 1) return;
        initAudio();

        if (isMobile) {
          const nextP = currentPage + 1;
          // Transitioning from even to odd (e.g., 0 to 1, or 2 to 3) triggers physical sheet flip
          if (currentPage % 2 === 0) {
            // STAGE 1: Reset camera to center immediately to observe the flip animation cleanly
            targetCameraX = 0;
            if (controls) {
              controls.target.x = 0;
              controls.update();
            }

            book.nextPage();
            playFlipSound();

            // STAGE 2: After a 500ms delay, pan smoothly to center the newly turned page
            setTimeout(() => {
              currentPage = nextP;
              updateTargetCameraX();
              updateUI();
              playPanSound();
            }, 500);
          } else {
            // Changing pages on the same open spread requires no physical flip - pan directly
            currentPage = nextP;
            updateTargetCameraX();
            updateUI();
            playPanSound();
          }
        } else {
          // Desktop logic: Non-delayed full spread flips
          triggerPageFlip(() => {
            if (currentPage === 0) {
              book.nextPage();
              currentPage = 1;
              playFlipSound();
            } else if (currentPage + 2 < totalPages) {
              book.nextPage();
              currentPage += 2;
              playFlipSound();
            } else if (currentPage + 1 < totalPages) {
              book.nextPage();
              currentPage = totalPages - 1;
              playFlipSound();
            }
            updateTargetCameraX();
            updateUI();
          });
        }
      }

      // Navigate page backwards
      function goPrev() {
        if (currentPage <= 0) return;
        initAudio();

        if (isMobile) {
          const prevP = currentPage - 1;
          // Transitioning from odd to even (e.g., 3 to 2, or 1 to 0) triggers physical sheet flip back
          if (currentPage % 2 === 1) {
            // STAGE 1: Reset camera to center immediately to observe the flip animation cleanly
            targetCameraX = 0;
            if (controls) {
              controls.target.x = 0;
              controls.update();
            }

            book.previousPage();
            playFlipSound();

            // STAGE 2: After a 500ms delay, pan smoothly to center the newly turned page
            setTimeout(() => {
              currentPage = prevP;
              updateTargetCameraX();
              updateUI();
              playPanSound();
            }, 500);
          } else {
            // Changing pages on the same open spread requires no physical flip - pan directly
            currentPage = prevP;
            updateTargetCameraX();
            updateUI();
            playPanSound();
          }
        } else {
          // Desktop logic: Non-delayed full spread flips
          triggerPageFlip(() => {
            if (currentPage === 1) {
              book.previousPage();
              currentPage = 0;
              playFlipSound();
            } else if (currentPage - 2 >= 1) {
              book.previousPage();
              currentPage -= 2;
              playFlipSound();
            }
            updateTargetCameraX();
            updateUI();
          });
        }
      }

      function goFirst() {
        if (currentPage === 0) return;
        initAudio();
        triggerPageFlip(() => {
          currentPage = 0;
          if (book) {
            book.progress = 0;
          }
          playFlipSound();
          if (isMobile) {
            targetCameraX = 0;
            if (controls) controls.target.x = 0;
            setTimeout(() => {
              updateTargetCameraX();
              updateUI();
            }, 500);
          } else {
            updateTargetCameraX();
            updateUI();
          }
        });
      }

      function goLast() {
        if (currentPage === totalPages - 1) return;
        initAudio();
        triggerPageFlip(() => {
          currentPage = totalPages - 1;
          if (book) {
            book.progress = book.totalPages;
          }
          playFlipSound();
          if (isMobile) {
            targetCameraX = 0;
            if (controls) controls.target.x = 0;
            setTimeout(() => {
              updateTargetCameraX();
              updateUI();
            }, 500);
          } else {
            updateTargetCameraX();
            updateUI();
          }
        });
      }

      // Interface synchronization
      function updateUI() {
        const pageIndicator = document.getElementById("page-indicator");
        if (isMobile) {
          pageIndicator.innerText = `Page ${currentPage + 1} of ${totalPages}`;
        } else {
          if (currentPage === 0) {
            pageIndicator.innerText = `Cover (Page 1 of ${totalPages})`;
          } else if (currentPage === totalPages - 1) {
            pageIndicator.innerText = `Back Cover (${totalPages} of ${totalPages})`;
          } else {
            pageIndicator.innerText = `Pages ${currentPage + 1}-${Math.min(currentPage + 2, totalPages)} of ${totalPages}`;
          }
        }
      }

      // Parser & Texture rendering pipeline
      async function loadPDF(file) {
        try {
          showLoader(true);
          updateLoaderText("Analyzing file structure...");

          const fileReader = new FileReader();
          fileReader.onload = async function () {
            try {
              const typedarray = new Uint8Array(this.result);
              const pdf = await pdfjsLib.getDocument({ data: typedarray })
                .promise;
              totalPages = pdf.numPages;

              const textures = [];

              for (let i = 1; i <= totalPages; i++) {
                updateLoaderText(`Converting Page ${i} / ${totalPages}...`);
                const page = await pdf.getPage(i);

                // Scale factor to preserve sharp typography textures
                const scale = 2.0;
                const viewport = page.getViewport({ scale });

                const canvas = document.createElement("canvas");
                const context = canvas.getContext("2d");
                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderContext = {
                  canvasContext: context,
                  viewport: viewport,
                };
                await page.render(renderContext).promise;

                const texture = new THREE.CanvasTexture(canvas);
                texture.minFilter = THREE.LinearFilter;
                texture.magFilter = THREE.LinearFilter;
                textures.push(texture);
              }

              initBook(textures);
              showLoader(false);
            } catch (e) {
              alert(
                "Encountered an issue processing the PDF file. Ensure it is not password-protected.",
              );
              showLoader(false);
            }
          };
          fileReader.readAsArrayBuffer(file);
        } catch (error) {
          console.error(error);
          showLoader(false);
        }
      }

      // Default placeholder rendering matching the user video design
      function generateDefaultPages() {
        const textures = [];
        const count = 6;
        totalPages = count;

        const pageDetails = [
          {
            title: "KNITTING IS LIFE",
            desc: "Cozy patterns & texture inspirations",
            accent: "VOLUME 01 / EDIT 02",
          },
          {
            title: "KNITTED ON IS HOBBY",
            desc: "Modern craft, stitches & yarn selections",
            accent: "STITCH PORTRAIT STUDY",
          },
          {
            title: "EDITOR WORD TO SAID",
            desc: "Reflections on contemporary needlework",
            accent: "EDITORIAL NOTE",
          },
          {
            title: "CREATIVE PATTERNS",
            desc: "Discover textures that weave stories",
            accent: "PATTERN COLLECTION",
          },
          {
            title: "THE ART OF YARN",
            desc: "Sourcing details and natural dyes",
            accent: "MATERIAL ANALYSIS",
          },
          {
            title: "THE END",
            desc: "Happy knitting & crafting",
            accent: "BACK COVER",
          },
        ];

        for (let i = 0; i < count; i++) {
          const canvas = document.createElement("canvas");
          canvas.width = 1024;
          canvas.height = 1327; // Clean portrait aspect ratio
          const ctx = canvas.getContext("2d");

          // Textured background
          ctx.fillStyle = "#1e1e1e";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          // Framing accent border
          ctx.strokeStyle = "#A3E635";
          ctx.lineWidth = 14;
          ctx.strokeRect(35, 35, canvas.width - 70, canvas.height - 70);

          const gradient = ctx.createRadialGradient(
            canvas.width / 2,
            canvas.height / 2,
            100,
            canvas.width / 2,
            canvas.height / 2,
            700,
          );
          gradient.addColorStop(0, "rgba(163, 230, 53, 0.04)");
          gradient.addColorStop(1, "rgba(0, 0, 0, 0.45)");
          ctx.fillStyle = gradient;
          ctx.fillRect(45, 45, canvas.width - 90, canvas.height - 90);

          // Typography layouts
          ctx.fillStyle = "#ffffff";
          ctx.font = "bold 68px sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(
            pageDetails[i].title,
            canvas.width / 2,
            canvas.height / 2 - 80,
          );

          ctx.fillStyle = "#a1a1aa";
          ctx.font = "italic 34px sans-serif";
          ctx.fillText(
            pageDetails[i].desc,
            canvas.width / 2,
            canvas.height / 2 + 50,
          );

          ctx.fillStyle = "#A3E635";
          ctx.font = "bold 28px sans-serif";
          ctx.fillText(
            pageDetails[i].accent,
            canvas.width / 2,
            canvas.height - 180,
          );

          // Graphic aesthetic details
          ctx.fillStyle = "rgba(163, 230, 53, 0.15)";
          ctx.beginPath();
          ctx.arc(
            canvas.width / 2,
            canvas.height / 2 - 280,
            60,
            0,
            Math.PI * 2,
          );
          ctx.fill();

          const texture = new THREE.CanvasTexture(canvas);
          textures.push(texture);
        }
        return textures;
      }

      // Loader handlers
      function showLoader(visible) {
        const loader = document.getElementById("loader-overlay");
        if (visible) {
          loader.style.display = "flex";
          loader.style.opacity = "1";
        } else {
          loader.style.opacity = "0";
          setTimeout(() => (loader.style.display = "none"), 500);
        }
      }

      function updateLoaderText(text) {
        document.getElementById("loader-text").innerText = text;
      }

      // Event hooks
      window.addEventListener("DOMContentLoaded", () => {
        initWebGL();

        // Render mock pages on launch
        const placeholders = generateDefaultPages();
        initBook(placeholders);
        showLoader(false);

        // Trigger upload file processing
        document
          .getElementById("pdf-uploader")
          .addEventListener("change", (e) => {
            if (e.target.files.length > 0) {
              loadPDF(e.target.files[0]);
            }
          });

        // UI click navigations
        document.getElementById("arrow-next").addEventListener("click", goNext);
        document.getElementById("arrow-prev").addEventListener("click", goPrev);
        document.getElementById("btn-first").addEventListener("click", goFirst);
        document.getElementById("btn-last").addEventListener("click", goLast);

        // Responsive Window scaling listener
        window.addEventListener("resize", () => {
          const container = document.getElementById("webgl-container");
          camera.aspect = container.clientWidth / container.clientHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(container.clientWidth, container.clientHeight);
          checkMobile();
        });

        // Page turns via Arrow Keys
        window.addEventListener("keydown", (e) => {
          if (e.key === "ArrowRight") goNext();
          if (e.key === "ArrowLeft") goPrev();
        });

        // Interactive direct book surface tap Raycasting
        const raycaster = new THREE.Raycaster();
        const mouseCoord = new THREE.Vector2();

        window.addEventListener("mousedown", (event) => {
          // Prevent interference on UI target boundaries
          if (
            event.target.closest("header") ||
            event.target.closest("footer") ||
            event.target.closest(".nav-arrow")
          ) {
            return;
          }

          mouseCoord.x = (event.clientX / window.innerWidth) * 2 - 1;
          mouseCoord.y = -(event.clientY / window.innerHeight) * 2 + 1;

          raycaster.setFromCamera(mouseCoord, camera);
          const intersects = raycaster.intersectObjects(scene.children, true);

          if (intersects.length > 0) {
            // Navigate according to which half of the book was tapped
            const relativePoint = intersects[0].point;
            if (relativePoint.x > 0) {
              goNext();
            } else {
              goPrev();
            }
          }
        });
      });
    </script>
  </body>
</html>
