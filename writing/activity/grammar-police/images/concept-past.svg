<svg viewBox="0 0 44 32" fill="none" xmlns="http://www.w3.org/2000/svg" width="44" height="32" aria-hidden="true">
  <!-- Soft background glow -->
  <circle cx="22" cy="14" r="12" fill="#FF8E3C" opacity="0.15" />

  <!-- Cute clock legs -->
  <line x1="15" y1="23" x2="12" y2="26" stroke="#FF8E3C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="29" y1="23" x2="32" y2="26" stroke="#FF8E3C" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Alarm bells (ears) -->
  <circle cx="13" cy="5" r="3" fill="#FF8E3C"/>
  <circle cx="31" cy="5" r="3" fill="#FF8E3C"/>
  <path d="M11 6a4 4 0 0 1 4-2" stroke="#4A3E3D" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <path d="M33 6a4 4 0 0 0-4-2" stroke="#4A3E3D" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <!-- Main Clock Body -->
  <circle cx="22" cy="14" r="11" fill="#FF8E3C"/>
  <circle cx="22" cy="14" r="8.5" fill="#FFF4E0"/>

  <!-- Clock Hands -->
  <line x1="22" y1="14" x2="22" y2="9" stroke="#4A3E3D" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="22" y1="14" x2="25" y2="17" stroke="#4A3E3D" stroke-width="2.2" stroke-linecap="round"/>
  <circle cx="22" cy="14" r="1.5" fill="#FF8E3C"/>

  <!-- Playful little sprout at the bottom left -->
  <path d="M5 28c1-3 3-3 4 0" stroke="#6BCB77" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M9 28c-1-3-3-3-4 0" stroke="#6BCB77" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M7 28v2" stroke="#6BCB77" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Friendly Text -->
  <text x="22" y="30" text-anchor="middle" font-size="5.2" font-weight="800" font-family="'Quicksand', 'Nunito', 'Segoe UI', sans-serif" fill="#4A3E3D" letter-spacing="0.5">PAST</text>
