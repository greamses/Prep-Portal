<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prep Portal | Punctuation Patrol</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 98L10 75V25L50 2L90 25V75L50 98Z' fill='%230a0a0a' fill-opacity='0.1' /%3E%3Cpath d='M50 50L10 27V73L50 96V50Z' fill='%230055ff' stroke='%230a0a0a' stroke-width='2.5' /%3E%3Cpath d='M50 50L90 27V73L50 96V50Z' fill='%23003db3' stroke='%230a0a0a' stroke-width='2.5' /%3E%3Cpath d='M50 50L90 27L50 4L10 27L50 50Z' fill='%23ffffff' stroke='%230a0a0a' stroke-width='2.5' /%3E%3Cpath d='M50 35L65 43V58L50 66L35 58V43L50 35Z' fill='%23ffe500' stroke='%230a0a0a' stroke-width='2' /%3E%3Ccircle cx='50' cy='50.5' r='4' fill='%230a0a0a' /%3E%3C/svg%3E" />
    <meta name="theme-color" content="#000000" />

    <link rel="stylesheet" href="/utils/components/nav.css" />
    <link rel="stylesheet" href="./style.css" />

    <style>body { visibility: hidden; }</style>

    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>

    <script type="importmap">
      {
        "imports": {
          "firebase/app":       "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
          "firebase/auth":      "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js",
          "firebase/storage":   "https://www.gstatic.com/firebasejs/12.13.0/firebase-storage.js"
        }
      }
    </script>
  </head>

  <body>
    <div id="loader">
      <div id="loader-wrapper"><div class="logo-cluster"></div></div>
      <div class="loader-word"><span>Patrol</span></div>
      <div class="loader-bar"></div>
    </div>

    <nav class="site-nav" data-nav="main"></nav>

    <!-- ═══ LANDING PAGE ═══ -->
    <div class="pp-landing">
      <div class="pp-landing-card">

        <div class="pp-landing-badge" aria-hidden="true">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" width="52" height="52">
            <path d="M32 4L6 17V38C6 51 17 62 32 64C47 62 58 51 58 38V17L32 4Z" fill="#0055ff" stroke="#0a0a0a" stroke-width="3" stroke-linejoin="round"/>
            <text x="32" y="44" text-anchor="middle" font-size="28" font-family="serif" fill="#ffe500" font-weight="900">?</text>
          </svg>
        </div>

        <div class="pp-landing-body">
          <p class="pp-eyebrow">English &middot; Punctuation</p>
          <h1 class="pp-title">Punctuation Patrol</h1>
          <p class="pp-desc">
            Three exercises — question marks, full stops, and commas.
            Drag the correct punctuation mark into each gap.
          </p>

          <ul class="pp-tags" aria-label="Activity details">
            <li>3 Exercises</li>
            <li>34 Gaps</li>
            <li>Drag &amp; Drop</li>
            <li>Instant Marking</li>
          </ul>
        </div>

        <button class="pp-open-btn" id="ppOpen" aria-label="Open Punctuation Patrol book">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
          Open Patrol Book
        </button>

      </div>
    </div>

    <!-- ═══ FULL-SCREEN BOOK MODAL ═══ -->
    <div id="ppModal" class="pp-modal" role="dialog" aria-modal="true" aria-label="Punctuation Patrol book" hidden>

      <button class="pp-modal-close" id="ppClose" aria-label="Close book">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <div class="pp-stage">
        <button class="pp-nav-btn pp-nav-btn--prev" id="ppPrev" aria-label="Previous page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22" height="22"><polyline points="15 18 9 12 15 6"/></svg>
        </button>

        <div id="ppBook"></div>

        <button class="pp-nav-btn pp-nav-btn--next" id="ppNext" aria-label="Next page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22" height="22"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

      <div class="pp-modal-footer">
        <span class="pp-page-num" id="ppPageNum"></span>
        <span class="pp-hint">Double-click any page to turn</span>
      </div>

    </div>

    <script src="/utils/components/loader.js"></script>
    <script src="/utils/components/nav-builder.js" type="module"></script>
    <script src="./script.js"></script>
  </body>
</html>
