<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 240" width="100%" height="100%">
  <!-- Definitions for styling -->
  <defs>
    <style>
      .face-front { 
        fill: #dbeafe; 
        stroke: #2563eb; 
        stroke-width: 3; 
        stroke-linejoin: round; 
      }
      .face-top { 
        fill: #eff6ff; 
        stroke: #2563eb; 
        stroke-width: 3; 
        stroke-linejoin: round; 
      }
      .face-right { 
        fill: #bfdbfe; 
        stroke: #2563eb; 
        stroke-width: 3; 
        stroke-linejoin: round; 
      }
      .hidden-line { 
        stroke: #60a5fa; 
        stroke-width: 2; 
        stroke-dasharray: 5,5; 
        stroke-linecap: round; 
      }
      .label-text { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 18px; 
        fill: #1e293b; 
        text-anchor: middle; 
        dominant-baseline: middle; 
      }
      .sa-text { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 20px; 
        font-weight: bold; 
        fill: #dc2626; 
        text-anchor: middle; 
        dominant-baseline: middle; 
      }
    </style>
  </defs>

  <!-- Hidden back edges -->
  <line x1="100" y1="210" x2="140" y2="170" class="hidden-line" />
  <line x1="140" y1="70" x2="140" y2="170" class="hidden-line" />
  <line x1="240" y1="170" x2="140" y2="170" class="hidden-line" />

  <!-- Cube Faces -->
  <!-- Top Face -->
  <polygon points="100,110 140,70 240,70 200,110" class="face-top" />
  
  <!-- Right Face -->
  <polygon points="200,110 240,70 240,170 200,210" class="face-right" />
  
  <!-- Front Face -->
  <polygon points="100,110 200,110 200,210 100,210" class="face-front" />

  <!-- Dimension Labels -->
  <!-- Side length (Width) -->
  <text x="150" y="235" class="label-text">4 cm</text>
  
  <!-- Side length (Height) -->
  <text x="65" y="160" class="label-text">4 cm</text>
  
  <!-- Side length (Depth) -->
  <text x="245" y="195" class="label-text">4 cm</text>

  <!-- Question indicator -->
  <text x="170" y="35" class="sa-text">Surface Area = ?</text>
</svg>