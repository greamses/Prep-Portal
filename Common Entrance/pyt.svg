<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 240" width="100%" height="100%">
  <!-- Definitions for styling -->
  <defs>
    <style>
      .triangle { 
        fill: #eff6ff; 
        stroke: #2563eb; 
        stroke-width: 3; 
        stroke-linejoin: round; 
      }
      .right-angle { 
        fill: none; 
        stroke: #2563eb; 
        stroke-width: 2; 
        stroke-linejoin: miter;
      }
      .label-text { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 18px; 
        fill: #1e293b; 
        text-anchor: middle; 
        dominant-baseline: middle; 
      }
      .hypotenuse-text { 
        font-family: 'Segoe UI', Arial, sans-serif; 
        font-size: 20px; 
        font-weight: bold; 
        fill: #dc2626; 
        text-anchor: middle; 
        dominant-baseline: middle; 
      }
    </style>
  </defs>

  <!-- Right-angled triangle -->
  <polygon points="90,60 90,180 250,180" class="triangle" />

  <!-- Right angle marker -->
  <polyline points="90,165 105,165 105,180" class="right-angle" />

  <!-- Side Labels -->
  <!-- Vertical side (6 cm) -->
  <text x="60" y="120" class="label-text">6 cm</text>
  
  <!-- Horizontal side (8 cm) -->
  <text x="170" y="210" class="label-text">8 cm</text>
  
  <!-- Hypotenuse -->
  <text x="195" y="105" class="hypotenuse-text">c = ?</text>
</svg>