<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 70" width="70" height="70" role="img" aria-label="Prep Portal icon">
  <title>Prep Portal Icon — Dark</title>

  <!-- Blue offset shadow -->
  <rect x="4" y="4" width="64" height="64" fill="#0b57d0"/>

  <!-- White icon box -->
  <rect x="0" y="0" width="64" height="64" fill="#ffffff"/>

  <!-- P letterform — ink -->
  <rect x="8"  y="8"  width="7"  height="48" fill="#1f1f1f"/>
  <rect x="8"  y="8"  width="40" height="7"  fill="#1f1f1f"/>
  <rect x="41" y="8"  width="7"  height="28" fill="#1f1f1f"/>
  <rect x="8"  y="29" width="40" height="7"  fill="#1f1f1f"/>

  <!-- Portal counter — blue window -->
