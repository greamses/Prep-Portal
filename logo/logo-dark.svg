<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 282 72" width="282" height="72" role="img" aria-label="Prep Portal">
  <title>Prep Portal — Dark</title>
  <desc>Prep Portal — AI-powered exam preparation platform (dark variant)</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&amp;display=swap');
    </style>
  </defs>

  <!-- ═══════════════════════════
       ICON MARK — inverted
  ════════════════════════════ -->
  <g id="icon-mark-dark">
    <!-- Blue offset shadow -->
    <rect x="4" y="8" width="64" height="64" fill="#0b57d0"/>

    <!-- White icon box -->
    <rect x="0" y="4" width="64" height="64" fill="#ffffff"/>

    <!-- P letterform — ink -->
    <rect x="8"  y="12" width="7"  height="48" fill="#1f1f1f"/>
    <rect x="8"  y="12" width="40" height="7"  fill="#1f1f1f"/>
    <rect x="41" y="12" width="7"  height="28" fill="#1f1f1f"/>
    <rect x="8"  y="33" width="40" height="7"  fill="#1f1f1f"/>

    <!-- Portal counter — blue window (same, always blue) -->
    <rect x="15" y="19" width="26" height="14" fill="#0b57d0"/>
  </g>

  <!-- ═══════════════════════════
       WORDMARK — light
  ════════════════════════════ -->
  <g id="wordmark-dark">
    <!-- Vertical divider -->
    <rect x="78" y="10" width="2" height="52" fill="#ffffff"/>

    <!-- PREP — white -->
    <text
      x="90"
      y="38"
      font-family="'Unbounded', 'Arial Black', sans-serif"
      font-weight="900"
      font-size="24"
      fill="#ffffff"
      letter-spacing="1.5">PREP</text>

    <!-- PORTAL — blue -->
    <text
      x="91"
      y="56"
      font-family="'Unbounded', 'Arial Black', sans-serif"
      font-weight="700"
      font-size="11.5"
      fill="#0b57d0"
      letter-spacing="5.5">PORTAL</text>
  </g>
</svg>
