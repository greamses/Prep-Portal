<svg width="120" height="120" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 1. LEFT FACET: Subtle Brightness Shift -->
  <path d="M50 50L10 27V73L50 96V50Z" stroke="#0a0a0a" stroke-width="2.5">
    <animate attributeName="fill" values="#0055ff;#3377ff;#0055ff" dur="3s" repeatCount="indefinite" />
  </path>
  
  <!-- 2. RIGHT FACET -->
  <path d="M50 50L90 27V73L50 96V50Z" fill="#003db3" stroke="#0a0a0a" stroke-width="2.5">
    <animate attributeName="fill" values="#003db3;#0055ff;#003db3" dur="3s" repeatCount="indefinite" />
  </path>
  
  <!-- 3. TOP FACET -->
  <path d="M50 50L90 27L50 4L10 27L50 50Z" fill="#ffffff" stroke="#0a0a0a" stroke-width="2.5" />
  
  <!-- 4. SCANNING GRID LINES: Moving Data Effect -->
  <g opacity="0.4">
    <path d="M10 27L50 50" stroke="#0a0a0a" stroke-width="1.5" stroke-dasharray="8 4">
      <animate attributeName="stroke-dashoffset" from="0" to="24" dur="1s" repeatCount="indefinite" />
    </path>
    <path d="M90 27L50 50" stroke="#0a0a0a" stroke-width="1.5" stroke-dasharray="8 4">
      <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1s" repeatCount="indefinite" />
    </path>
    <path d="M50 4V50" stroke="#0a0a0a" stroke-width="1.5" stroke-dasharray="8 4">
      <animate attributeName="stroke-dashoffset" from="0" to="24" dur="1.5s" repeatCount="indefinite" />
    </path>
  </g>
  
  <!-- 5. THE PORTAL CORE: Breathing/Pulsing Animation -->
  <g id="core">
    <path d="M50 35L65 43V58L50 66L35 58V43L50 35Z" fill="#ffe500" stroke="#0a0a0a" stroke-width="2">
      <animate attributeName="fill" values="#ffe500;#ffd700;#ffe500" dur="2s" repeatCount="indefinite" />
      <animateTransform attributeName="transform" type="scale" values="1;1.08;1" dur="2s" repeatCount="indefinite" additive="sum" transform-origin="50 50" />
    </path>
    <circle cx="50" cy="50.5" r="3" fill="#0a0a0a">
      <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- 6. EXTERNAL ACCENTS: Rotating Status Indicator -->
  <g id="status-ring">
    <path d="M25 65L35 70" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" />
    </path>
    <path d="M75 65L65 70" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite" />
    </path>
    <rect x="48" y="75" width="4" height="15" fill="#ffe500" stroke="#0a0a0a" stroke-width="1">
      <animate attributeName="y" values="75;78;75" dur="2s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>