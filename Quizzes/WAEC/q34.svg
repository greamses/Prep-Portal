<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Top Label -->
  <text x="150" y="30" font-family="Arial" font-size="12" text-anchor="middle">NOT DRAWN TO SCALE</text>
  
  <!-- Outer Circle -->
  <circle cx="150" cy="150" r="100" fill="none" stroke="black" stroke-width="2" />
  
  <!-- Center Point -->
  <circle cx="150" cy="150" r="3" fill="black" />
  
  <!-- Sector Lines (Radii) -->
  <line x1="150" y1="150" x2="150" y2="50" stroke="black" stroke-width="2" />
  <line x1="150" y1="150" x2="237" y2="200" stroke="black" stroke-width="2" />
  <line x1="150" y1="150" x2="56" y2="184" stroke="black" stroke-width="2" />
  
  <!-- Arc for Women (120°) -->
  <path d="M 150 120 A 30 30 0 0 1 176 165" fill="none" stroke="black" stroke-width="1.5" />
  <text x="175" y="130" font-family="Arial" font-size="14">120°</text>
  
  <!-- Arc for Children (169°) -->
  <path d="M 150 120 A 30 30 0 0 0 122 160" fill="none" stroke="black" stroke-width="1.5" />
  <text x="100" y="140" font-family="Arial" font-size="14">169°</text>
  
  <!-- Sector Labels -->
  <text x="180" y="100" font-family="Arial" font-size="16" transform="rotate(15 180 100)">Women</text>
  <text x="180" y="230" font-family="Arial" font-size="16">Men</text>
  <text x="65" y="145" font-family="Arial" font-size="16" transform="rotate(-30 65 145)">Children</text>
</svg>