        <svg viewBox="0 0 150 150" width="100%" height="100%" style="max-width:200px;" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <style>
              .grid-line {
                stroke: #333;
                stroke-width: 1;
                fill: none;
              }
              
              .shaded {
                fill: #64748b;
              }
              
              .unshaded {
                fill: #f8fafc;
              }
            </style>
          </defs>
          <rect width="150" height="150" fill="#f8fafc" stroke="#333" stroke-width="2" />
          
          <!-- Shaded blocks -->
          <!-- Row 1 -->
          <rect x="0" y="0" width="30" height="30" class="shaded" />
          <rect x="30" y="0" width="30" height="30" class="shaded" />
          <rect x="90" y="0" width="30" height="30" class="shaded" />
          
          <!-- Row 2 -->
          <rect x="0" y="30" width="30" height="30" class="shaded" />
          <rect x="30" y="30" width="30" height="30" class="shaded" />
          <rect x="90" y="30" width="30" height="30" class="shaded" />
          
          <!-- Row 3 -->
          <rect x="0" y="60" width="30" height="30" class="shaded" />
          <rect x="30" y="60" width="30" height="30" class="shaded" />
          <rect x="60" y="60" width="30" height="30" class="shaded" />
          <rect x="120" y="60" width="30" height="30" class="shaded" />
          
          <!-- Row 4 -->
          <rect x="60" y="90" width="30" height="30" class="shaded" />
          <rect x="90" y="90" width="30" height="30" class="shaded" />
          
          <!-- Row 5 -->
          <rect x="120" y="120" width="30" height="30" class="shaded" />
          
          <!-- Grid Lines -->
          <line x1="30" y1="0" x2="30" y2="150" class="grid-line" />
          <line x1="60" y1="0" x2="60" y2="150" class="grid-line" />
          <line x1="90" y1="0" x2="90" y2="150" class="grid-line" />
          <line x1="120" y1="0" x2="120" y2="150" class="grid-line" />
          <line x1="0" y1="30" x2="150" y2="30" class="grid-line" />
          <line x1="0" y1="60" x2="150" y2="60" class="grid-line" />
          <line x1="0" y1="90" x2="150" y2="90" class="grid-line" />
          <line x1="0" y1="120" x2="150" y2="120" class="grid-line" />
        </svg>